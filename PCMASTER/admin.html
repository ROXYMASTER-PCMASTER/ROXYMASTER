<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXYMASTER PCMASTER – Portal Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0a0f1e; color:#e0e0e0; min-height:100vh; }

/* ========== LOGIN ========== */
#login-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
.login-box {
  background:#111827; border:1px solid #1e3a5f; border-radius:12px;
  padding:40px; width:100%; max-width:420px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.login-box h1 {
  text-align:center; font-size:2em; margin-bottom:8px;
  background:linear-gradient(90deg,#4fc3f7,#81d4fa);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.login-box .sub { text-align:center; color:#78909c; margin-bottom:30px; font-size:0.9em; }
.login-box .form-group { margin-bottom:16px; }
.login-box label { display:block; margin-bottom:6px; color:#78909c; font-size:0.85em; }
.login-box input {
  width:100%; padding:12px 16px;
  background:#1a2332; border:1px solid #1e3a5f; border-radius:6px;
  color:#e0e0e0; font-size:1em; outline:none; transition:border .2s;
}
.login-box input:focus { border-color:#4fc3f7; }
.login-box .btn-login {
  width:100%; padding:12px; margin-top:8px;
  background:linear-gradient(90deg,#1565c0,#1976d2);
  color:#fff; border:none; border-radius:6px; font-size:1em;
  cursor:pointer; transition:opacity .2s;
}
.login-box .btn-login:hover { opacity:0.9; }
.login-box .error { color:#ef5350; text-align:center; margin-top:12px; font-size:0.85em; display:none; }

/* ========== MAIN APP ========== */
#app-screen { display:none; }
.top-bar { background:#111827; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #1e3a5f; }
.top-bar h1 { color:#4fc3f7; font-size:1.3em; }
.top-bar .user-info { display:flex; align-items:center; gap:12px; }
.status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:4px; }
.status-dot.online { background:#4caf50; box-shadow:0 0 8px #4caf50; }
.status-dot.offline { background:#f44336; }
.container { display:flex; height:calc(100vh - 56px); }
.sidebar { width:220px; background:#111827; padding:16px 0; border-right:1px solid #1e3a5f; flex-shrink:0; }
.sidebar a { display:block; padding:12px 20px; color:#9e9e9e; text-decoration:none; font-size:0.9em; transition:.2s; border-left:3px solid transparent; cursor:pointer; }
.sidebar a:hover, .sidebar a.active { color:#4fc3f7; background:#1a2332; border-left-color:#4fc3f7; }
.main { flex:1; overflow-y:auto; padding:24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
.card { background:#111827; border:1px solid #1e3a5f; border-radius:8px; padding:16px; }
.card h3 { font-size:0.75em; color:#78909c; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.card .value { font-size:1.7em; font-weight:bold; color:#4fc3f7; }
.card .sub { font-size:0.7em; color:#607d8b; margin-top:4px; }
.section-title { color:#4fc3f7; margin:24px 0 12px; font-size:1.1em; border-bottom:1px solid #1e3a5f; padding-bottom:8px; }
.table-wrapper { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.8em; }
th { background:#1a2332; color:#4fc3f7; padding:10px 12px; text-align:left; }
td { padding:8px 12px; border-bottom:1px solid #1e3a5f; }
tr:hover { background:#1a2332; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7em; font-weight:bold; }
.badge.activo { background:#1b5e20; color:#4caf50; }
.badge.inactivo { background:#37474f; color:#9e9e9e; }
.badge.colgado { background:#b71c1c; color:#ef5350; }
.badge.oro { background:#ff8f00; color:#fff; }
.badge.plata { background:#78909c; color:#fff; }
.badge.bronce { background:#5d4037; color:#ffcc80; }
button { padding:8px 14px; border:none; border-radius:4px; cursor:pointer; font-size:0.8em; transition:.2s; }
.btn-blue { background:#1565c0; color:#fff; } .btn-blue:hover { background:#1976d2; }
.btn-green { background:#2e7d32; color:#fff; } .btn-green:hover { background:#388e3c; }
.btn-red { background:#c62828; color:#fff; } .btn-red:hover { background:#d32f2f; }
.btn-orange { background:#e65100; color:#fff; } .btn-orange:hover { background:#f57c00; }
.console { background:#0a0f1e; border:1px solid #1e3a5f; border-radius:8px; padding:16px; margin-top:16px; }
.console-output { background:#000; color:#4caf50; padding:12px; border-radius:4px; min-height:100px; max-height:200px; overflow-y:auto; font-family:'Consolas',monospace; font-size:0.78em; margin:12px 0; }
.console-input { display:flex; gap:8px; }
.console-input input { flex:1; background:#1a2332; border:1px solid #1e3a5f; color:#e0e0e0; padding:8px 12px; border-radius:4px; font-family:'Consolas',monospace; }
.mp-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:16px; }
.mp-card { background:#111827; border:1px solid #1e3a5f; border-radius:8px; padding:20px; }
.mp-card h4 { color:#4fc3f7; margin-bottom:12px; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:0.8em; color:#78909c; margin-bottom:4px; }
.form-group input, .form-group select { width:100%; background:#1a2332; border:1px solid #1e3a5f; color:#e0e0e0; padding:8px 12px; border-radius:4px; }
.kbt-balance { text-align:center; padding:20px; }
.kbt-balance .big { font-size:2.8em; color:#ffd700; }
@media(max-width:768px){ .sidebar{display:none;} .grid{grid-template-columns:repeat(2,1fr);} .mp-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="login-screen">
  <div class="login-box">
    <h1>🖥️ ROXYMASTER</h1>
    <p class="sub">Portal Administrador — PCMASTER</p>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="PCMASTER" value="PCMASTER" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">🔐 Iniciar Sesión</button>
    <p class="error" id="loginError">Credenciales inválidas</p>
  </div>
</div>

<!-- ==================== APP SCREEN ==================== -->
<div id="app-screen">
  <div class="top-bar">
    <h1>🖥️ PCMASTER – Panel de Control</h1>
    <div class="user-info">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Cargando...</span>
      &nbsp;|&nbsp;
      <span id="serverLabel">PCMASTER</span>
      &nbsp;|&nbsp;
      <button class="btn-red" onclick="doLogout()" style="font-size:0.75em;">🚪 Salir</button>
    </div>
  </div>
  <div class="container">
    <div class="sidebar">
      <a href="#" class="active" data-tab="dashboard">📊 Dashboard</a>
      <a href="#" data-tab="pcbots">🖥️ PCBOTs</a>
      <a href="#" data-tab="perfiles">👤 Perfiles</a>
      <a href="#" data-tab="sesiones">🔴 Sesiones</a>
      <a href="#" data-tab="kbt">💰 KBT Tokenomics</a>
      <a href="#" data-tab="marketplace">🔄 Marketplace P2P</a>
      <a href="#" data-tab="comandos">⚡ Consola</a>
    </div>
    <div class="main" id="mainContent">
      <p style="color:#607d8b;">Cargando dashboard...</p>
    </div>
  </div>
</div>

<script>
// ==================================================================
// CONFIGURACION
// ==================================================================
const API = `http://${location.hostname}:8086/api`;
let token = localStorage.getItem('roxy_token') || '';
let sesion = null;
let autoRefresh = null;

// ==================================================================
// LOGIN
// ==================================================================
document.getElementById('loginPass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');

  if (!user || !pass) {
    errEl.textContent = 'Completa todos los campos';
    errEl.style.display = 'block';
    return;
  }

  try {
    const r = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: user, password: pass })
    });
    const data = await r.json();

    if (data.ok) {
      token = data.token;
      sesion = { email: user.toUpperCase(), rol: data.rol, token: data.token };
      localStorage.setItem('roxy_token', token);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('serverLabel').textContent = sesion.email + ' [' + sesion.rol + ']';
      cargarDashboard();
      autoRefresh = setInterval(cargarDashboard, 5000);
    } else {
      errEl.textContent = data.error || 'Error de autenticación';
      errEl.style.display = 'block';
    }
  } catch (e) {
    errEl.textContent = 'Error de conexión: ' + e.message;
    errEl.style.display = 'block';
  }
}

function doLogout() {
  token = '';
  sesion = null;
  localStorage.removeItem('roxy_token');
  clearInterval(autoRefresh);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

// Auto-login si hay token guardado
if (token) {
  // Validar token contra el servidor
  fetch(`${API}/dashboard`)
    .then(r => r.json())
    .then(d => {
      if (d.pcbots_conectados !== undefined) {
        sesion = { email: 'PCMASTER', rol: 'admin', token };
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('serverLabel').textContent = 'PCMASTER [admin]';
        cargarDashboard();
        autoRefresh = setInterval(cargarDashboard, 5000);
      }
    })
    .catch(() => {});
}

// ==================================================================
// NAVEGACION
// ==================================================================
document.querySelectorAll('.sidebar a').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    const tab = link.dataset.tab;
    clearInterval(autoRefresh);
    if (tab === 'dashboard') { cargarDashboard(); autoRefresh = setInterval(cargarDashboard, 5000); }
    else if (tab === 'pcbots') cargarPcbots();
    else if (tab === 'perfiles') cargarPerfiles();
    else if (tab === 'sesiones') cargarSesiones();
    else if (tab === 'kbt') { cargarKBT(); autoRefresh = setInterval(cargarKBT, 10000); }
    else if (tab === 'marketplace') cargarMarketplace();
    else if (tab === 'comandos') cargarComandos();
  });
});

// ==================================================================
// API HELPERS
// ==================================================================
async function apiGet(path) {
  const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
  const r = await fetch(`${API}${path}`, { headers });
  return r.json();
}
async function apiPost(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(`${API}${path}`, { method:'POST', headers, body:JSON.stringify(body) });
  return r.json();
}

// ==================================================================
// DASHBOARD
// ==================================================================
async function cargarDashboard() {
  const d = await apiGet('/dashboard');
  document.getElementById('statusDot').className = d.pcbots_conectados > 0 ? 'status-dot online' : 'status-dot offline';
  document.getElementById('statusText').textContent = d.pcbots_conectados > 0 ? `${d.pcbots_conectados} PCBOTs` : 'Sin PCBOTs';

  const kbt = d.kbt || {};
  const html = `
    <div class="grid">
      <div class="card"><h3>PCBOTs Conectados</h3><div class="value">${d.pcbots_conectados}</div><div class="sub">de ${d.pcbots_total} registrados</div></div>
      <div class="card"><h3>Perfiles Totales</h3><div class="value">${d.perfiles_total}</div><div class="sub">A:${d.perfiles_activos} I:${d.perfiles_inactivos} C:${d.perfiles_colgados}</div></div>
      <div class="card"><h3>Grupos</h3><div class="value">${d.grupos || 0}</div><div class="sub">Creados</div></div>
      <div class="card"><h3>Uptime</h3><div class="value">${Math.floor(d.uptime / 60)}m</div><div class="sub">Servidor</div></div>
      <div class="card"><h3>KBT Circulación</h3><div class="value" style="color:#ffd700;">${(kbt.tokens_en_circulacion || 0).toFixed(4)}</div><div class="sub">Tokens</div></div>
      <div class="card"><h3>Granjeros KBT</h3><div class="value">${kbt.total_granjeros || 0}</div><div class="sub">Registrados</div></div>
    </div>

    <h2 class="section-title">🖥️ PCBOTs Conectados</h2>
    ${d.pcbots && Object.keys(d.pcbots).length ? `
    <div class="table-wrapper"><table>
      <tr><th>ID</th><th>Hostname</th><th>Usuario</th><th>IP Local</th><th>Estado</th><th>Perfiles</th><th>Activos</th><th>Inactivos</th><th>Colgados</th><th>Último HB</th></tr>
      ${Object.entries(d.pcbots).map(([pid, info]) => `
        <tr>
          <td><b>${pid}</b></td>
          <td>${info.hostname || '-'}</td>
          <td>${info.usuario || '-'}</td>
          <td>${info.ip_local || '-'}</td>
          <td><span class="badge ${info.estado === 'conectado' ? 'activo' : 'inactivo'}">${info.estado || '?'}</span></td>
          <td>${info.perfiles || 0}</td>
          <td><span class="badge activo">${info.activos || 0}</span></td>
          <td><span class="badge inactivo">${info.inactivos || 0}</span></td>
          <td><span class="badge colgado">${info.colgados || 0}</span></td>
          <td>${info.last_heartbeat ? Math.floor((Date.now()/1000 - info.last_heartbeat)) + 's' : '-'}</td>
        </tr>`).join('')}
    </table></div>` : '<p style="color:#607d8b;">No hay PCBOTs conectados</p>'}
  `;
  document.getElementById('mainContent').innerHTML = html;
}

// ==================================================================
// PCBOTS
// ==================================================================
async function cargarPcbots() {
  const d = await apiGet('/dashboard');
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">🖥️ PCBOTs (${d.pcbots_conectados} conectados / ${d.pcbots_total} total)</h2>
    ${d.pcbots && Object.keys(d.pcbots).length ? `
    <div class="table-wrapper"><table>
      <tr><th>ID</th><th>Hostname</th><th>Usuario</th><th>IP Local</th><th>IP Tailscale</th><th>Estado</th><th>Perfiles</th><th>A/I/C</th><th>Último HB</th></tr>
      ${Object.entries(d.pcbots).map(([pid, info]) => `
        <tr>
          <td><b>${pid}</b></td>
          <td>${info.hostname || '-'}</td>
          <td>${info.usuario || '-'}</td>
          <td>${info.ip_local || '-'}</td>
          <td>${info.ip_tailscale || '-'}</td>
          <td><span class="badge ${info.estado === 'conectado' ? 'activo' : 'inactivo'}">${info.estado || '?'}</span></td>
          <td>${info.perfiles || 0}</td>
          <td><span class="badge activo">${info.activos || 0}</span>/<span class="badge inactivo">${info.inactivos || 0}</span>/<span class="badge colgado">${info.colgados || 0}</span></td>
          <td>${info.last_heartbeat ? Math.floor((Date.now()/1000 - info.last_heartbeat)) + 's' : '-'}</td>
        </tr>`).join('')}
    </table></div>` : '<p style="color:#607d8b;">No hay PCBOTs registrados</p>'}
  `;
}

// ==================================================================
// PERFILES
// ==================================================================
async function cargarPerfiles() {
  const d = await apiGet('/dashboard');
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">👤 Perfiles (${d.perfiles_total}) — A:${d.perfiles_activos} I:${d.perfiles_inactivos} C:${d.perfiles_colgados}</h2>
    <div class="table-wrapper"><table>
      <tr><th>PCBOT</th><th>Perfiles Registrados</th><th>Activos</th><th>Inactivos</th><th>Colgados</th></tr>
      ${d.pcbots ? Object.entries(d.pcbots).map(([pid, info]) => `
        <tr>
          <td><b>${pid}</b></td>
          <td>${info.perfiles || 0}</td>
          <td><span class="badge activo">${info.activos || 0}</span></td>
          <td><span class="badge inactivo">${info.inactivos || 0}</span></td>
          <td><span class="badge colgado">${info.colgados || 0}</span></td>
        </tr>`).join('') : '<tr><td colspan="5">Sin datos</td></tr>'}
    </table></div>
  `;
}

// ==================================================================
// SESIONES
// ==================================================================
async function cargarSesiones() {
  const html = `
    <h2 class="section-title">🔴 Sesiones Activas</h2>
    <p style="color:#607d8b;">Las sesiones activas se muestran en tiempo real en el Dashboard.</p>
    <br>
    <h2 class="section-title">📊 Resumen por PCBOT</h2>
    <div id="sesionesResumen">Cargando...</div>
  `;
  document.getElementById('mainContent').innerHTML = html;

  const d = await apiGet('/dashboard');
  document.getElementById('sesionesResumen').innerHTML = d.pcbots ? `
    <div class="table-wrapper"><table>
      <tr><th>PCBOT</th><th>Estado</th><th>Perfiles</th><th>Activos</th><th>Inactivos</th><th>Colgados</th></tr>
      ${Object.entries(d.pcbots).map(([pid, info]) => `
        <tr>
          <td><b>${pid}</b></td>
          <td><span class="badge ${info.estado === 'conectado' ? 'activo' : 'inactivo'}">${info.estado || '?'}</span></td>
          <td>${info.perfiles || 0}</td>
          <td>${info.activos || 0}</td>
          <td>${info.inactivos || 0}</td>
          <td>${info.colgados || 0}</td>
        </tr>`).join('')}
    </table></div>
  ` : '<p style="color:#607d8b;">No hay PCBOTs conectados</p>';
}

// ==================================================================
// KBT
// ==================================================================
async function cargarKBT() {
  const [stats, params] = await Promise.all([
    apiGet('/kbt/stats'),
    apiGet('/kbt/parametros')
  ]);
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">💰 Tokenomics KBT</h2>
    <div class="grid">
      <div class="card"><h3>Granjeros</h3><div class="value">${stats.total_granjeros || 0}</div><div class="sub">Registrados</div></div>
      <div class="card"><h3>KBT Circulación</h3><div class="value" style="color:#ffd700;">${(stats.tokens_en_circulacion || 0).toFixed(4)}</div><div class="sub">Tokens</div></div>
      <div class="card"><h3>Reserva (RE)</h3><div class="value">${(stats.reserva_tokens || 0).toFixed(4)}</div><div class="sub">KBT | S/ ${(stats.reserva_soles || 0).toFixed(2)}</div></div>
      <div class="card"><h3>Perfiles KBT</h3><div class="value">${stats.total_perfiles || 0}</div><div class="sub">Registrados</div></div>
      <div class="card"><h3>Transacciones</h3><div class="value">${stats.total_transacciones || 0}</div><div class="sub">Totales</div></div>
      <div class="card"><h3>Precio Ancla</h3><div class="value">S/ ${((params && params.P_token) || 1.00).toFixed(2)}</div><div class="sub">PEN/KBT</div></div>
    </div>

    <h2 class="section-title">⚙️ Parámetros KBT</h2>
    <div class="table-wrapper"><table>
      <tr><th>Parámetro</th><th>Valor</th></tr>
      ${params ? Object.entries(params).filter(([k]) => typeof params[k] !== 'object').map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('') : '<tr><td colspan="2">No disponible</td></tr>'}
    </table></div>
  `;
}

// ==================================================================
// MARKETPLACE
// ==================================================================
async function cargarMarketplace() {
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">🔄 Marketplace P2P</h2>
    <div class="mp-grid">
      <div class="mp-card">
        <h4>📤 Transferir KBT</h4>
        <div class="form-group"><label>Vendedor (Email)</label><input id="mpVendedor" placeholder="ej: PCWILMER"></div>
        <div class="form-group"><label>Comprador (Email)</label><input id="mpComprador" placeholder="ej: PCUSER2"></div>
        <div class="form-group"><label>Cantidad KBT</label><input id="mpCantidad" type="number" step="0.01" placeholder="0.00"></div>
        <p style="color:#ff8f00;font-size:0.75em;margin-bottom:8px;">⚠️ Comisión: 15% para el Fondo</p>
        <button class="btn-blue" onclick="transferirKBT()">Transferir</button>
        <div id="mpResult" style="margin-top:12px;font-size:0.85em;"></div>
      </div>
      <div class="mp-card">
        <h4>📋 Consultar Saldo</h4>
        <div class="form-group"><label>Email Granjero</label><input id="saldoQueryId" placeholder="ej: PCWILMER"></div>
        <button class="btn-blue" onclick="consultarSaldo()">Consultar</button>
        <div id="saldoResult" style="margin-top:12px;font-size:0.85em;"></div>
      </div>
    </div>
  `;
}

async function transferirKBT() {
  const vendedor = document.getElementById('mpVendedor').value.trim();
  const comprador = document.getElementById('mpComprador').value.trim();
  const tokens = parseFloat(document.getElementById('mpCantidad').value);
  const res = document.getElementById('mpResult');
  if (!vendedor || !comprador || isNaN(tokens) || tokens <= 0) {
    res.innerHTML = '<span style="color:#f44336;">Completa todos los campos</span>';
    return;
  }
  res.textContent = 'Procesando...';
  const r = await apiPost('/kbt/transferir', { vendedor, comprador, tokens });
  if (r.ok) {
    res.innerHTML = `<span style="color:#4caf50;">✅ ${tokens} KBT de ${vendedor} → ${comprador}</span>`;
  } else {
    res.innerHTML = `<span style="color:#f44336;">❌ ${r.error || 'Error'}</span>`;
  }
}

async function consultarSaldo() {
  const email = document.getElementById('saldoQueryId').value.trim();
  const res = document.getElementById('saldoResult');
  if (!email) { res.innerHTML = '<span style="color:#f44336;">Ingresa un email</span>'; return; }
  const r = await apiGet(`/kbt/saldo?granjero_id=${email}`);
  if (r.error) {
    res.innerHTML = `<span style="color:#f44336;">${r.error}</span>`;
  } else {
    res.innerHTML = `
      <b>${r.nombre || email}</b><br>
      💰 <b>${(r.saldo_tokens || 0).toFixed(4)} KBT</b><br>
      💵 S/ ${(r.saldo_soles || 0).toFixed(2)}<br>
      ⭐ Nivel: ${r.nivel_fiabilidad || 'N/A'}<br>
      📅 Registro: ${r.fecha_registro || 'N/A'}
    `;
  }
}

function cargarComandos() {
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">⚡ Consola de Comandos</h2>
    <p style="color:#78909c;font-size:0.8em;margin-bottom:12px;">
      <b>Comandos:</b> estado, perfiles, asignar N url URL duracion MIN, detener url URL, comentarios_activar url URL nivel medio, comentarios_desactivar url URL
    </p>
    <div class="console">
      <div class="console-output" id="cmdOutput">⚡ Listo para comandos...</div>
      <div class="console-input">
        <input id="cmdInput" placeholder="asignar 2 url https://kick.com/test duracion 62" onkeydown="if(event.key==='Enter')ejecutarComando()">
        <button class="btn-blue" onclick="ejecutarComando()">▶️ Ejecutar</button>
      </div>
    </div>
  `;
}

async function ejecutarComando() {
  const input = document.getElementById('cmdInput');
  const out = document.getElementById('cmdOutput');
  const cmd = input.value.trim();
  if (!cmd) return;
  out.textContent += `\n> ${cmd}`;
  input.value = '';
  const r = await apiPost('/comando', { comando: cmd });
  out.textContent += `\n${r.resultado || JSON.stringify(r)}`;
  out.scrollTop = out.scrollHeight;
}

async function accionAPI(comando) {
  const out = document.getElementById('cmdOutput') || { textContent: '' };
  if (out.tagName) out.textContent = `Ejecutando: ${comando}...`;
  const r = await apiPost('/comando', { comando });
  if (out.tagName) out.textContent += `\n> ${r.resultado || JSON.stringify(r)}`;
  else alert(r.resultado || JSON.stringify(r));
}
