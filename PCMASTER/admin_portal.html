<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXYMASTER PCMASTER – Portal Admin v6.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0f1e;color:#e0e0e0;min-height:100vh}
.top-bar{background:#111827;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #1e3a5f}
.top-bar h1{color:#4fc3f7;font-size:1.4em}
.status-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.online{background:#4caf50;box-shadow:0 0 8px #4caf50}
.status-dot.offline{background:#f44336}
.container{display:flex;height:calc(100vh - 56px)}
.sidebar{width:250px;background:#111827;padding:16px 0;border-right:1px solid #1e3a5f;overflow-y:auto}
.sidebar a{display:block;padding:12px 24px;color:#9e9e9e;text-decoration:none;font-size:0.95em;transition:.2s;border-left:3px solid transparent}
.sidebar a:hover,.sidebar a.active{color:#4fc3f7;background:#1a2332;border-left-color:#4fc3f7}
.main{flex:1;overflow-y:auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#111827;border:1px solid #1e3a5f;border-radius:8px;padding:16px}
.card h3{font-size:0.8em;color:#78909c;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .value{font-size:1.8em;font-weight:bold;color:#4fc3f7}
.card .sub{font-size:0.75em;color:#607d8b}
.section-title{color:#4fc3f7;margin:24px 0 12px;font-size:1.1em;border-bottom:1px solid #1e3a5f;padding-bottom:8px}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.85em}
th{background:#1a2332;color:#4fc3f7;padding:10px 12px;text-align:left}
td{padding:8px 12px;border-bottom:1px solid #1e3a5f}
tr:hover{background:#1a2332}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.75em;font-weight:bold}
.badge.activo{background:#1b5e20;color:#4caf50}
.badge.inactivo{background:#37474f;color:#9e9e9e}
.badge.colgado{background:#b71c1c;color:#ef5350}
.badge.oro{background:#ff8f00;color:#fff}
.badge.plata{background:#78909c;color:#fff}
.badge.bronce{background:#5d4037;color:#ffcc80}
button{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:0.85em;transition:.2s}
.btn-blue{background:#1565c0;color:#fff}
.btn-blue:hover{background:#1976d2}
.btn-green{background:#2e7d32;color:#fff}
.btn-green:hover{background:#388e3c}
.btn-red{background:#c62828;color:#fff}
.btn-red:hover{background:#d32f2f}
.btn-orange{background:#e65100;color:#fff}
.btn-orange:hover{background:#f57c00}
.btn-yellow{background:#f9a825;color:#000}
.btn-yellow:hover{background:#fbc02d}
.console{background:#0a0f1e;border:1px solid #1e3a5f;border-radius:8px;padding:16px;margin-top:16px}
.console-output{background:#000;color:#4caf50;padding:12px;border-radius:4px;min-height:120px;max-height:240px;overflow-y:auto;font-family:'Consolas',monospace;font-size:0.8em;margin:12px 0}
.console-input{display:flex;gap:8px}
.console-input input{flex:1;background:#1a2332;border:1px solid #1e3a5f;color:#e0e0e0;padding:8px 12px;border-radius:4px;font-family:'Consolas',monospace}
.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.form-group{margin-bottom:12px;flex:1;min-width:150px}
.form-group label{display:block;font-size:0.8em;color:#78909c;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#1a2332;border:1px solid #1e3a5f;color:#e0e0e0;padding:8px 12px;border-radius:4px}
.form-group textarea{resize:vertical;min-height:60px;font-family:'Consolas',monospace}
.form-group select option{background:#111827;color:#e0e0e0}
.param-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a2332}
.param-row label{flex:1;font-size:0.85em;color:#9e9e9e}
.param-row input{width:120px;background:#1a2332;border:1px solid #1e3a5f;color:#e0e0e0;padding:6px 10px;border-radius:4px}
.param-row select{width:120px;background:#1a2332;border:1px solid #1e3a5f;color:#e0e0e0;padding:6px 10px;border-radius:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.result-box{margin-top:12px;padding:12px;border-radius:4px;font-size:0.85em;min-height:40px}
.result-box.success{background:#1b5e20;color:#7ee787;border:1px solid #2e7d32}
.result-box.error{background:#b71c1c;color:#ef5350;border:1px solid #d32f2f}
.result-box.info{background:#1a2332;color:#4fc3f7;border:1px solid #1e3a5f}
.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.toggle-row label{color:#9e9e9e;font-size:0.85em}
.toggle{position:relative;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#30363d;border-radius:24px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:#2e7d32}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
@media(max-width:768px){.sidebar{display:none}.two-col{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="top-bar">
  <h1>🖥️ PCMASTER – Panel Super Admin v6.3</h1>
  <div>
    <span class="status-dot online" id="statusDot"></span>
    <span id="statusText">Conectado</span>
    &nbsp;|&nbsp; <span id="serverIP">--</span>
    &nbsp;|&nbsp; KBT: <span id="kbtPrice" style="color:#ffd700">--</span>
  </div>
</div>
<div class="container">
  <div class="sidebar">
    <a href="#" class="active" data-tab="dashboard">📊 Dashboard</a>
    <a href="#" data-tab="orquestar">🎯 Orquestar</a>
    <a href="#" data-tab="pcbots">🖥️ PCBOTs</a>
    <a href="#" data-tab="perfiles">👤 Perfiles</a>
    <a href="#" data-tab="urls">🔴 URLs Activas</a>
    <a href="#" data-tab="kbt">💰 KBT – Tokenomics</a>
    <a href="#" data-tab="marketplace">🔄 Marketplace P2P</a>
    <a href="#" data-tab="referidos">👥 Referidos</a>
    <a href="#" data-tab="comandos">⚡ Consola Avanzada</a>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
const API = `http://${location.hostname}:8086/api`;
let autoRefresh = null;
let kbtParamsCache = {};

// ====== NAVEGACION ======
document.querySelectorAll('.sidebar a').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    const tab = link.dataset.tab;
    clearInterval(autoRefresh);
    switch(tab) {
      case 'dashboard': cargarDashboard(); autoRefresh = setInterval(cargarDashboard, 5000); break;
      case 'orquestar': cargarOrquestar(); break;
      case 'pcbots': cargarPcbots(); autoRefresh = setInterval(cargarPcbots, 10000); break;
      case 'perfiles': cargarPerfiles(); autoRefresh = setInterval(cargarPerfiles, 10000); break;
      case 'urls': cargarUrls(); autoRefresh = setInterval(cargarUrls, 5000); break;
      case 'kbt': cargarKBT(); autoRefresh = setInterval(cargarKBT, 15000); break;
      case 'marketplace': cargarMarketplace(); break;
      case 'referidos': cargarReferidos(); autoRefresh = setInterval(cargarReferidos, 15000); break;
      case 'comandos': cargarComandos(); break;
    }
  });
});

// ====== API ======
async function apiGet(path) {
  try { const r = await fetch(`${API}${path}`); return r.json(); }
  catch(e) { return {error: e.message}; }
}
async function apiPost(path, body) {
  try {
    const r = await fetch(`${API}${path}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    return r.json();
  } catch(e) { return {error: e.message}; }
}

// ====== DASHBOARD ======
async function cargarDashboard() {
  const d = await apiGet('/dashboard');
  document.getElementById('statusDot').className = d.pcbots_conectados > 0 ? 'status-dot online' : 'status-dot offline';
  document.getElementById('statusText').textContent = d.pcbots_conectados > 0 ? 'Conectado' : 'Sin PCBOTs';
  document.getElementById('serverIP').textContent = d.ip_servidor + ':5006';
  if (d.kbt && d.kbt.precio_ancla) document.getElementById('kbtPrice').textContent = 'S/ ' + d.kbt.precio_ancla.toFixed(2);

  const kbt = d.kbt || {};
  document.getElementById('mainContent').innerHTML = `
    <div class="grid">
      <div class="card"><h3>PCBOTs Conectados</h3><div class="value">${d.pcbots_conectados || 0}</div><div class="sub">Activos ahora</div></div>
      <div class="card"><h3>Perfiles Totales</h3><div class="value">${d.perfiles_totales || 0}</div><div class="sub">A:${d.perfiles_activos||0} I:${d.perfiles_inactivos||0} C:${d.perfiles_colgados||0}</div></div>
      <div class="card"><h3>URLs Activas</h3><div class="value">${(d.urls_activas||[]).length}</div><div class="sub">Streams en vivo</div></div>
      <div class="card"><h3>JARVIS Comentarios</h3><div class="value">${d.jarvis_comentarios || 0}</div><div class="sub">Generados</div></div>
      <div class="card"><h3>KBT Circulación</h3><div class="value">${(kbt.tokens_en_circulacion||0).toFixed(2)}</div><div class="sub">🔥Q:${(kbt.tokens_quemables_total||0).toFixed(2)} | 💎C:${(kbt.tokens_comprados_total||0).toFixed(2)}</div></div>
      <div class="card"><h3>Granjeros</h3><div class="value">${kbt.total_granjeros || 0}</div><div class="sub">Registrados</div></div>
    </div>
    <h2 class="section-title">🔴 URLs Activas</h2>
    ${(d.urls_activas||[]).length ? `
    <div class="table-wrapper"><table>
      <tr><th>URL</th><th>Perfiles</th><th>Restante</th><th>Comentarios</th><th>Inicio</th><th>Acción</th></tr>
      ${d.urls_activas.map(u => `
        <tr>
          <td title="${u.url}">${(u.url||'').substring(0,50)}...</td>
          <td>${u.perfiles_asignados}</td><td>${u.tiempo_restante}m</td><td>${u.comentarios_activos?'✅':'❌'}</td><td>${u.inicio}</td>
          <td>
            <button class="btn-red" onclick="accionAPI('detener url ${u.url}')">⏹️ Detener</button>
            ${u.comentarios_activos
              ? `<button class="btn-orange" onclick="accionAPI('comentarios_desactivar url ${u.url}')">🔇 Off</button>`
              : `<button class="btn-green" onclick="accionAPI('comentarios_activar url ${u.url} nivel medio')">🔊 On</button>`}
          </td>
        </tr>`).join('')}
    </table></div>` : '<p style="color:#607d8b;">No hay URLs activas</p>'}
    <h2 class="section-title">🖥️ PCBOTs</h2>
    <div class="table-wrapper"><table>
      <tr><th>ID</th><th>IP Local</th><th>IP Tailscale</th><th>Perfiles</th><th>Uptime</th><th>Acción</th></tr>
      ${(d.pcbots||[]).map(p => `<tr>
        <td>${p.id}</td><td>${p.ip_local}</td><td>${p.ip_tailscale}</td><td>${p.perfiles}</td><td>${p.uptime}</td>
        <td><button class="btn-orange" onclick="accionAPI('reiniciar_pcbot ${p.id}')">🔄 Reiniciar</button></td>
      </tr>`).join('')}
    </table></div>
  `;
}

// ====== ORQUESTAR (NUEVO - Formularios estructurados) ======
async function cargarOrquestar() {
  const d = await apiGet('/dashboard');
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">🎯 Orquestar Perfiles</h2>
    
    <div class="two-col">
      <!-- ABRIR URL EN PERFILES -->
      <div class="card" style="padding:20px">
        <h3 style="color:#4fc3f7;font-size:1em;margin-bottom:16px">📺 Asignar URL a Perfiles</h3>
        <div class="form-group"><label>URL del Stream</label><input id="orqUrl" placeholder="https://kick.com/usuario"></div>
        <div class="form-row">
          <div class="form-group"><label># Perfiles a usar</label><input id="orqNPerfiles" type="number" value="2" min="1" max="100"></div>
          <div class="form-group"><label>Duración (minutos)</label><input id="orqDuracion" type="number" value="62" min="1" max="1440"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>PCBOT (opcional)</label><select id="orqPcbot"><option value="">Automático (todos)</option>${(d.pcbots||[]).map(p => `<option value="${p.id}">${p.id}</option>`).join('')}</select></div>
          <div class="form-group"><label>Nivel Comentarios</label><select id="orqComentarios"><option value="ninguno">Sin comentarios</option><option value="bajo" selected>Bajo (c/5min)</option><option value="medio">Medio (c/2min)</option><option value="alto">Alto (c/30s)</option></select></div>
        </div>
        <button class="btn-green" style="width:100%;padding:12px;font-size:1em" onclick="orquestarAsignar()">▶️ ASIGNAR</button>
        <div id="orqResult" class="result-box info" style="margin-top:12px">Listo para orquestar</div>
      </div>

      <!-- ENVIAR COMENTARIO -->
      <div class="card" style="padding:20px">
        <h3 style="color:#4fc3f7;font-size:1em;margin-bottom:16px">💬 Enviar Comentario</h3>
        <div class="form-group"><label>URL donde comentar</label><input id="cmtUrl" placeholder="https://kick.com/usuario"></div>
        <div class="form-group"><label>Texto del comentario (o 'jarvis' para auto)</label><input id="cmtTexto" placeholder="jarvis"></div>
        <div class="form-row">
          <div class="form-group"><label># Perfiles</label><input id="cmtNPerfiles" type="number" value="1" min="1" max="50"></div>
          <div class="form-group"><label>Duración (min)</label><input id="cmtDuracion" type="number" value="62" min="1" max="1440"></div>
        </div>
        <button class="btn-blue" style="width:100%;padding:12px;font-size:1em" onclick="orquestarComentar()">💬 ENVIAR COMENTARIOS</button>
        <div id="cmtResult" class="result-box info" style="margin-top:12px">Listo para comentar</div>
      </div>
    </div>

    <!-- DETENER -->
    <div class="card" style="margin-top:16px;padding:20px">
      <h3 style="color:#f44336;font-size:1em;margin-bottom:12px">⏹️ Detener / Control</h3>
      <div class="form-row">
        <div class="form-group"><label>URL a detener</label><input id="stopUrl" placeholder="https://..."></div>
        <div class="form-group"><label>PCBOT</label><input id="stopPcbot" placeholder="ID o vacío para todos"></div>
        <div class="form-group" style="align-self:flex-end"><button class="btn-red" onclick="orquestarDetener()">⏹️ DETENER URL</button></div>
      </div>
      <div class="form-row" style="margin-top:8px">
        <div class="form-group"><label>PCBOT a reiniciar</label><input id="reiniciarPcbot" placeholder="ID"></div>
        <div class="form-group" style="align-self:flex-end"><button class="btn-orange" onclick="accionAPI('reiniciar_pcbot ' + document.getElementById('reiniciarPcbot').value)">🔄 REINICIAR PCBOT</button></div>
      </div>
      <div id="stopResult" class="result-box info" style="margin-top:12px"></div>
    </div>
  `;
}

async function orquestarAsignar() {
  const url = document.getElementById('orqUrl').value.trim();
  const n = parseInt(document.getElementById('orqNPerfiles').value);
  const dur = parseInt(document.getElementById('orqDuracion').value);
  const pcbot = document.getElementById('orqPcbot').value;
  const coment = document.getElementById('orqComentarios').value;
  const res = document.getElementById('orqResult');

  if (!url || isNaN(n) || n < 1) {
    res.className = 'result-box error'; res.textContent = '❌ URL y # de perfiles requeridos';
    return;
  }

  res.className = 'result-box info'; res.textContent = '⏳ Asignando...';
  const cmd = `asignar ${n} url ${url} duracion ${dur}` + (pcbot ? ` pcbot ${pcbot}` : '') + (coment !== 'ninguno' ? ` comentarios ${coment}` : '');
  const r = await apiPost('/comando', {comando: cmd});
  res.className = r.error ? 'result-box error' : 'result-box success';
  res.textContent = r.error ? `❌ ${r.error}` : `✅ ${r.resultado || 'Comando enviado: ' + cmd}`;
}

async function orquestarComentar() {
  const url = document.getElementById('cmtUrl').value.trim();
  const texto = document.getElementById('cmtTexto').value.trim();
  const n = parseInt(document.getElementById('cmtNPerfiles').value);
  const dur = parseInt(document.getElementById('cmtDuracion').value);
  const res = document.getElementById('cmtResult');

  if (!url) {
    res.className = 'result-box error'; res.textContent = '❌ URL requerida';
    return;
  }

  res.className = 'result-box info'; res.textContent = '⏳ Enviando...';
  const cmd = `comentarios_activar url ${url} nivel medio texto ${texto} perfiles ${n} duracion ${dur}`;
  const r = await apiPost('/comando', {comando: cmd});
  res.className = r.error ? 'result-box error' : 'result-box success';
  res.textContent = r.error ? `❌ ${r.error}` : `✅ ${r.resultado || 'Comando: ' + cmd}`;
}

async function orquestarDetener() {
  const url = document.getElementById('stopUrl').value.trim();
  const pcbot = document.getElementById('stopPcbot').value.trim();
  const res = document.getElementById('stopResult');
  if (!url) { res.className = 'result-box error'; res.textContent = '❌ Ingresa la URL'; return; }
  res.className = 'result-box info'; res.textContent = '⏳ Deteniendo...';
  const cmd = `detener url ${url}` + (pcbot ? ` pcbot ${pcbot}` : '');
  const r = await apiPost('/comando', {comando: cmd});
  res.className = r.error ? 'result-box error' : 'result-box success';
  res.textContent = r.error ? `❌ ${r.error}` : `✅ ${r.resultado || 'Comando: ' + cmd}`;
}

// ====== PCBOTS ======
async function cargarPcbots() {
  const d = await apiGet('/dashboard');
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">🖥️ PCBOTs Conectados (${(d.pcbots||[]).length})</h2>
    <div class="table-wrapper"><table>
      <tr><th>ID</th><th>IP Local</th><th>IP Tailscale</th><th>Perfiles</th><th>Uptime</th><th>Acción</th></tr>
      ${(d.pcbots||[]).map(p => `<tr>
        <td>${p.id}</td><td>${p.ip_local}</td><td>${p.ip_tailscale}</td><td>${p.perfiles}</td><td>${p.uptime}</td>
        <td><button class="btn-orange" onclick="accionAPI('reiniciar_pcbot ${p.id}')">🔄 Reiniciar</button></td>
      </tr>`).join('')}
    </table></div>
  `;
}

// ====== PERFILES ======
async function cargarPerfiles() {
  const d = await apiGet('/dashboard');
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">👤 Perfiles (${d.perfiles_totales||0}) — A:${d.perfiles_activos||0} I:${d.perfiles_inactivos||0} C:${d.perfiles_colgados||0}</h2>
    <div class="table-wrapper"><table>
      <tr><th>ID</th><th>Nombre</th><th>PCBOT</th><th>Estado</th><th>URL</th><th>Sin Uso</th></tr>
      ${(d.perfiles_lista||[]).map(p => `
        <tr><td>${p.id}</td><td>${p.nombre}</td><td>${p.pcbot}</td>
          <td><span class="badge ${p.estado}">${p.estado}</span></td>
          <td>${p.url_actual||'-'}</td><td>${p.tiempo_sin_uso}</td>
        </tr>`).join('')}
    </table></div>
  `;
}

// ====== URLs ACTIVAS ======
async function cargarUrls() {
  const d = await apiGet('/dashboard');
  const urls = d.urls_activas || [];
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">🔴 URLs Activas (${urls.length})</h2>
    ${urls.length ? `
    <div class="table-wrapper"><table>
      <tr><th>URL</th><th>Perfiles</th><th>Restante</th><th>Comentarios</th><th>Inicio</th><th>Acción</th></tr>
      ${urls.map(u => `<tr>
        <td title="${u.url}">${(u.url||'').substring(0,60)}...</td>
        <td>${u.perfiles_asignados}</td><td>${u.tiempo_restante}m</td><td>${u.comentarios_activos?'✅':'❌'}</td><td>${u.inicio}</td>
        <td>
          <button class="btn-red" onclick="accionAPI('detener url ${u.url}')">⏹️ Detener</button>
        </td>
      </tr>`).join('')}
    </table></div>` : '<p style="color:#607d8b;">No hay URLs activas</p>'}
  `;
}

// ====== KBT TOKENOMICS (EDITABLE) ======
async function cargarKBT() {
  const [stats, granjeros, params] = await Promise.all([
    apiGet('/kbt/stats'),
    apiGet('/kbt/granjeros'),
    apiGet('/kbt/parametros')
  ]);
  kbtParamsCache = params;

  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">💰 Tokenomics KBT</h2>
    <div class="grid">
      <div class="card"><h3>Granjeros</h3><div class="value">${stats.total_granjeros||0}</div></div>
      <div class="card"><h3>KBT Circulación</h3><div class="value" style="color:#ffd700">${(stats.tokens_en_circulacion||0).toFixed(4)} KBT</div></div>
      <div class="card"><h3>Reserva (RE)</h3><div class="value">${(stats.reserva_tokens||0).toFixed(4)}</div><div class="sub">KBT | S/ ${(stats.reserva_soles||0).toFixed(2)}</div></div>
      <div class="card"><h3>Perfiles Registrados</h3><div class="value">${stats.total_perfiles||0}</div></div>
      <div class="card"><h3>Transacciones</h3><div class="value">${stats.total_transacciones||0}</div></div>
      <div class="card"><h3>Precio Ancla</h3><div class="value">S/ ${(params.P_token||1.00).toFixed(2)}</div><div class="sub">PEN/KBT</div></div>
    </div>

    <h2 class="section-title">⚙️ Parámetros Editables</h2>
    <div class="card" style="padding:20px">
      <div class="param-row">
        <label>💵 Precio Ancla KBT (PEN):</label>
        <input id="kbtParamPrecio" type="number" step="0.01" value="${(params.P_token||1.00).toFixed(2)}">
      </div>
      <div class="param-row">
        <label>🔥 Tasa de Quema (% por mes):</label>
        <input id="kbtParamQuema" type="number" step="0.1" value="${(params.tasa_quema_mensual||5.0).toFixed(1)}">
      </div>
      <div class="param-row">
        <label>🎉 Happy Hour Bonus (% extra tokens):</label>
        <input id="kbtParamHappy" type="number" step="1" value="${params.bonus_happy_hour||20}">
      </div>
      <div class="param-row">
        <label>🔄 Comisión Marketplace P2P (%):</label>
        <input id="kbtParamComision" type="number" step="0.1" value="${(params.comision_marketplace||15.0).toFixed(1)}">
      </div>
      <div class="param-row">
        <label>🏛️ Tributo al Sistema (% transacciones):</label>
        <input id="kbtParamTributo" type="number" step="0.1" value="${(params.tributo_sistema||5.0).toFixed(1)}">
      </div>
      <div class="param-row">
        <label>🏷️ Happy Hour:</label>
        <div class="toggle"><input type="checkbox" id="kbtParamHappyOn" ${params.happy_hour_activo ? 'checked' : ''}><span class="toggle-slider"></span></div>
      </div>
      <button class="btn-green" style="margin-top:16px;width:100%;padding:12px;font-size:1em" onclick="guardarKBTParams()">💾 GUARDAR PARÁMETROS</button>
      <div id="kbtSaveResult" class="result-box info" style="margin-top:12px"></div>
    </div>

    <h2 class="section-title">👨‍🌾 Granjeros</h2>
    <div class="table-wrapper"><table>
      <tr><th>ID</th><th>Nombre</th><th>Saldo KBT</th><th>Saldo PEN</th><th>Nivel</th><th>Registro</th></tr>
      ${(granjeros||[]).map(g => `<tr>
        <td>${g.id}</td><td>${g.nombre}</td><td>${(g.saldo_tokens||0).toFixed(4)}</td><td>S/ ${(g.saldo_soles||0).toFixed(2)}</td>
        <td><span class="badge ${(g.nivel_fiabilidad||'oro').toLowerCase()}">${g.nivel_fiabilidad}</span></td><td>${g.fecha_registro}</td>
      </tr>`).join('')}
    </table></div>
  `;
}

async function guardarKBTParams() {
  const res = document.getElementById('kbtSaveResult');
  const params = {
    P_token: parseFloat(document.getElementById('kbtParamPrecio').value),
    tasa_quema_mensual: parseFloat(document.getElementById('kbtParamQuema').value),
    bonus_happy_hour: parseInt(document.getElementById('kbtParamHappy').value),
    comision_marketplace: parseFloat(document.getElementById('kbtParamComision').value),
    tributo_sistema: parseFloat(document.getElementById('kbtParamTributo').value),
    happy_hour_activo: document.getElementById('kbtParamHappyOn').checked
  };
  res.className = 'result-box info'; res.textContent = '⏳ Guardando...';
  const r = await apiPost('/kbt/parametros', params);
  res.className = r.ok ? 'result-box success' : 'result-box error';
  res.textContent = r.ok ? '✅ Parámetros guardados correctamente' : `❌ ${r.error || 'Error al guardar'}`;
  if (r.ok) kbtParamsCache = params;
}

// ====== MARKETPLACE P2P ======
async function cargarMarketplace() {
  const [stats, granjeros] = await Promise.all([apiGet('/kbt/stats'), apiGet('/kbt/granjeros')]);
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">🔄 Marketplace P2P</h2>
    <div class="two-col">
      <div class="card" style="padding:20px">
        <h3 style="color:#4fc3f7;margin-bottom:12px">📤 Transferir KBT</h3>
        <div class="form-group"><label>Vendedor (ID Granjero)</label><select id="mpVendedor"><option value="">Seleccionar...</option>${(granjeros||[]).map(g => `<option value="${g.id}">${g.nombre} (${(g.saldo_tokens||0).toFixed(2)} KBT)</option>`).join('')}</select></div>
        <div class="form-group"><label>Comprador (ID Granjero)</label><select id="mpComprador"><option value="">Seleccionar...</option>${(granjeros||[]).map(g => `<option value="${g.id}">${g.nombre}</option>`).join('')}</select></div>
        <div class="form-group"><label>Cantidad KBT</label><input id="mpCantidad" type="number" step="0.01" placeholder="0.00"></div>
        <p style="color:#ff8f00;font-size:0.75em;margin-bottom:8px">⚠️ Comisión: ${(kbtParamsCache.comision_marketplace||5).toFixed(1)}%</p>
        <button class="btn-blue" style="width:100%" onclick="transferirKBT()">Transferir</button>
        <div id="mpResult" style="margin-top:12px;font-size:0.85em"></div>
      </div>
      <div class="card" style="padding:20px">
        <h3 style="color:#4fc3f7;margin-bottom:12px">📋 Consultar Saldo</h3>
        <div class="form-group"><label>ID Granjero</label><select id="saldoQueryId"><option value="">Seleccionar...</option>${(granjeros||[]).map(g => `<option value="${g.id}">${g.nombre}</option>`).join('')}</select></div>
        <button class="btn-blue" style="width:100%" onclick="consultarSaldo()">Consultar</button>
        <div id="saldoResult" style="margin-top:12px;font-size:0.85em"></div>
      </div>
    </div>
  `;
}

async function transferirKBT() {
  const vendedor = document.getElementById('mpVendedor').value.trim();
  const comprador = document.getElementById('mpComprador').value.trim();
  const tokens = parseFloat(document.getElementById('mpCantidad').value);
  const res = document.getElementById('mpResult');
  if (!vendedor || !comprador || isNaN(tokens) || tokens <= 0) {
    res.innerHTML = '<span style="color:#f44336;">Completa todos los campos</span>'; return;
  }
  if (vendedor === comprador) {
    res.innerHTML = '<span style="color:#f44336;">Vendedor y comprador deben ser distintos</span>'; return;
  }
  res.textContent = 'Procesando...';
  const r = await apiPost('/kbt/transferir', {vendedor, comprador, tokens});
  if (r.ok) res.innerHTML = `<span style="color:#4caf50;">✅ ${tokens} KBT de ${vendedor} → ${comprador}</span>`;
  else res.innerHTML = `<span style="color:#f44336;">❌ ${r.error || 'Error'}</span>`;
}

async function consultarSaldo() {
  const id = document.getElementById('saldoQueryId').value.trim();
  const res = document.getElementById('saldoResult');
  if (!id) { res.innerHTML = '<span style="color:#f44336;">Ingresa un ID</span>'; return; }
  const r = await apiGet(`/kbt/saldo?granjero_id=${id}`);
  if (r.error) { res.innerHTML = `<span style="color:#f44336;">${r.error}</span>`; }
  else {
    res.innerHTML = `<b>${r.nombre || r.id}</b><br>💰 <b>${(r.saldo_tokens||0).toFixed(4)} KBT</b><br>💵 S/ ${(r.saldo_soles||0).toFixed(2)}<br>⭐ Nivel: ${r.nivel_fiabilidad}<br>📅 Registro: ${r.fecha_registro}`;
  }
}

// ====== REFERIDOS ======
async function cargarReferidos() {
  const d = await apiGet('/referidos/raiz');
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">👥 Sistema de Referidos</h2>
    <div class="grid">
      <div class="card"><h3>PCMASTER (Raíz)</h3><div class="value">PCMASTER_ROOT</div><div class="sub">Referidor principal del sistema</div></div>
      <div class="card"><h3>Total Referidos</h3><div class="value">${d.total_referidos || 0}</div><div class="sub">Directos + Indirectos</div></div>
      <div class="card"><h3>Comisión Nivel 1</h3><div class="value">${d.comision_nivel1 || 5}%</div><div class="sub">Referidos directos</div></div>
      <div class="card"><h3>Comisión Nivel 2</h3><div class="value">${d.comision_nivel2 || 2}%</div><div class="sub">Referidos indirectos</div></div>
    </div>
    <div class="card" style="padding:20px;margin-top:16px">
      <h3 style="color:#4fc3f7;margin-bottom:12px">🌳 Árbol de Referidos</h3>
      <div id="arbolReferidos" style="font-family:'Consolas',monospace;font-size:0.85em;max-height:400px;overflow-y:auto">Cargando...</div>
    </div>
  `;
  // Cargar árbol
  const arbol = await apiGet('/referidos/arbol');
  const arbolDiv = document.getElementById('arbolReferidos');
  if (arbol.error) {
    arbolDiv.innerHTML = `<span style="color:#f44336;">${arbol.error}</span>`;
  } else {
    arbolDiv.innerHTML = renderArbol(arbol, 0);
  }
}

function renderArbol(nodo, nivel) {
  if (!nodo) return '';
  const indent = '&nbsp;&nbsp;'.repeat(nivel);
  const icono = nivel === 0 ? '🏰' : (nivel === 1 ? '👤' : '👥');
  let html = `<div>${indent}${icono} <b>${esc(nodo.id || '?')}</b> — KBT: ${(nodo.saldo_tokens||0).toFixed(2)} | Ref: ${nodo.referidos_directos||0}</div>`;
  if (nodo.hijos && nodo.hijos.length) {
    nodo.hijos.forEach(h => { html += renderArbol(h, nivel + 1); });
  }
  return html;
}

// ====== COMANDOS (Consola Avanzada) ======
function cargarComandos() {
  document.getElementById('mainContent').innerHTML = `
    <h2 class="section-title">⚡ Consola Avanzada</h2>
    <p style="color:#78909c;font-size:0.8em;margin-bottom:12px">
      Comandos: <b>estado</b> | <b>perfiles</b> | <b>asignar N url URL duracion MIN</b> | <b>comentarios_activar url URL nivel medio</b> | <b>comentarios_desactivar url URL</b> | <b>detener url URL</b> | <b>reiniciar_pcbot ID</b>
    </p>
    <div class="console">
      <div class="console-output" id="cmdOutput">Listo para comandos...</div>
      <div class="console-input">
        <input id="cmdInput" placeholder="asignar 2 url https://kick.com/test duracion 10" onkeydown="if(event.key==='Enter')ejecutarComando()">
        <button class="btn-blue" onclick="ejecutarComando()">▶️ Ejecutar</button>
      </div>
    </div>
  `;
}

// ====== ACCIONES ======
async function accionAPI(comando) {
  const out = document.getElementById('cmdOutput');
  if (!out) { alert('Ejecutando: ' + comando); return; }
  out.textContent = `Ejecutando: ${comando}...`;
  const r = await apiPost('/comando', {comando});
  out.textContent += `\n> ${r.resultado || JSON.stringify(r)}`;
  out.scrollTop = out.scrollHeight;
}

async function ejecutarComando() {
  const input = document.getElementById('cmdInput');
  const out = document.getElementById('cmdOutput');
  if (!input || !out) return;
  const cmd = input.value.trim();
  if (!cmd) return;
  out.textContent += `\n> ${cmd}`;
  input.value = '';
  const r = await apiPost('/comando', {comando: cmd});
  out.textContent += `\n${r.resultado || JSON.stringify(r)}`;
  out.scrollTop = out.scrollHeight;
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ====== INICIO ======
cargarDashboard();
autoRefresh = setInterval(cargarDashboard, 5000);
</script>
