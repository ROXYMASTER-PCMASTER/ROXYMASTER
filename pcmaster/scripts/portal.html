<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roxymaster admin v8.3</title>
<style>
:root {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-input: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --radius: 8px;
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}
/* sidebar */
.sidebar {
  width: 220px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.sidebar h2 {
  font-size: 14px;
  color: var(--accent);
  padding: 0 16px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
  text-transform: lowercase;
  letter-spacing: 0.5px;
}
.sidebar nav { display: flex; flex-direction: column; flex: 1; }
.sidebar nav a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 10px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  position: relative;
}
.sidebar nav a:hover { color: var(--text); background: #1c2128; }
.sidebar nav a.activo {
  color: var(--accent);
  border-left-color: var(--accent);
  background: #1c2128;
}
.sidebar nav a .badge {
  background: var(--red);
  color: #fff;
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 10px;
  margin-left: 6px;
  display: none;
}
.sidebar .user-info {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  margin-top: auto;
  font-size: 12px;
  color: var(--text-muted);
}
.sidebar .user-info button {
  margin-top: 8px;
  width: 100%;
}
/* main */
.main {
  margin-left: 220px;
  flex: 1;
  padding: 20px 24px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .acciones { display: flex; gap: 8px; }
/* tabs */
.tab-content { display: none; }
.tab-content.activo { display: block; }
/* cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.card h2 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
}
.card h3 {
  font-size: 13px;
  font-weight: 600;
  margin: 12px 0 8px;
  color: var(--text);
}
/* kpi grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.kpi-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.kpi-card .kpi-titulo {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: lowercase;
  margin-bottom: 6px;
}
.kpi-card .kpi-valor {
  display: block;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.kpi-card .kpi-subtitulo {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}
.kpi-card .kpi-expand {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}
.kpi-card.expandida .kpi-expand { display: block; }
/* botones */
.btn {
  display: inline-block;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  background: var(--bg-input);
  color: var(--text);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--text-muted); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn-danger:hover { opacity: 0.85; }
.btn-success { background: var(--green); color: #000; border-color: var(--green); }
.btn-outline { background: transparent; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
/* inputs */
input, select, textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 7px 10px;
  font-size: 13px;
  outline: none;
  width: 100%;
  font-family: inherit;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 60px; }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
/* tables */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
table th, table td {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
table th { color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: lowercase; }
table tr:hover { background: #1c2128; }
table td.editable { cursor: pointer; }
table td.editable input { padding: 2px 4px; font-size: 12px; }
/* filtros */
.filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filtros input, .filtros select { width: auto; min-width: 150px; }
/* modales */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
.modal-overlay.activo { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 640px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { font-size: 16px; margin-bottom: 16px; color: var(--accent); }
.modal .close {
  float: right;
  background: transparent;
  color: var(--text-muted);
  border: none;
  font-size: 20px;
  cursor: pointer;
}
.modal .close:hover { color: var(--red); }
/* toast */
.toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1100;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  max-width: 380px;
  animation: slideIn 0.3s ease;
}
.toast-success { background: #1a3a2a; color: var(--green); border: 1px solid var(--green); }
.toast-error { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }
.toast-info { background: #1a2a3a; color: var(--accent); border: 1px solid var(--accent); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
/* var row (tokenomia) */
.var-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.var-label {
  width: 180px;
  font-size: 12px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.var-input { width: 120px; }
/* proyecciones grid */
.proy-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.proy-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.proy-card .proy-titulo { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
.proy-card .proy-linea { font-size: 12px; color: var(--text-muted); margin: 3px 0; }
/* happy hour */
.hh-estado-activo { color: var(--green); font-weight: 600; }
.hh-estado-inactivo { color: var(--text-muted); }
/* mensajes */
.mensaje-row {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.mensaje-row .m-de { color: var(--text-muted); }
.mensaje-row .m-texto { color: var(--text); margin: 2px 0; }
.mensaje-row .m-fecha { color: var(--text-muted); font-size: 11px; }
/* seguridad */
.evento-row {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.evento-row .ev-tipo {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  margin-right: 8px;
}
.ev-critico { background: var(--red); color: #fff; }
.ev-alerta { background: var(--orange); color: #000; }
.ev-info { background: var(--accent); color: #fff; }
/* paginacion */
.paginacion { display: flex; gap: 6px; margin-top: 12px; justify-content: center; }
.paginacion button { min-width: 30px; }
/* loading */
.loading { text-align: center; padding: 40px; color: var(--text-muted); }
.loading::after { content: "..."; animation: dots 1.2s steps(3) infinite; }
@keyframes dots { 33%{content:"."} 66%{content:".."} }
</style>
</head>
<body>

<!-- sidebar -->
<aside class="sidebar">
  <h2>roxymaster admin</h2>
  <nav>
    <a data-tab="kpi" class="activo">kpi</a>
    <a data-tab="usuarios">usuarios</a>
    <a data-tab="perfiles">perfiles</a>
    <a data-tab="pcs">pcbots</a>
    <a data-tab="sesiones">sesiones</a>
    <a data-tab="retiros">retiros</a>
    <a data-tab="mensajes">mensajes <span class="badge" id="msg_badge">0</span></a>
    <a data-tab="monitoreo">monitoreo</a>
    <a data-tab="tokenomia">tokenomia</a>
    <a data-tab="proyecciones">proyecciones</a>
    <a data-tab="happy_hour">happy hour</a>
    <a data-tab="seguridad">seguridad</a>
  </nav>
  <div class="user-info">
    <div id="usuario_email">cargando...</div>
    <button class="btn btn-sm" onclick="roxy.cerrar_sesion()">cerrar sesion</button>
  </div>
</aside>

<!-- main content -->
<main class="main">
  <header class="header">
    <h1 id="panel_titulo">panel kpi</h1>
    <div class="acciones">
      <button class="btn btn-sm" onclick="roxy.cerrar_sesion()">salir</button>
    </div>
  </header>

  <!-- paneles -->
  <div id="tab_kpi" class="tab-content activo"><div class="loading"></div></div>
  <div id="tab_usuarios" class="tab-content"><div class="loading"></div></div>
  <div id="tab_perfiles" class="tab-content"><div class="loading"></div></div>
  <div id="tab_pcs" class="tab-content"><div class="loading"></div></div>
  <div id="tab_sesiones" class="tab-content"><div class="loading"></div></div>
  <div id="tab_retiros" class="tab-content"><div class="loading"></div></div>
  <div id="tab_mensajes" class="tab-content"><div class="loading"></div></div>
  <div id="tab_monitoreo" class="tab-content"><div class="loading"></div></div>
  <div id="tab_tokenomia" class="tab-content"><div class="loading"></div></div>
  <div id="tab_proyecciones" class="tab-content"><div class="loading"></div></div>
  <div id="tab_happy_hour" class="tab-content"><div class="loading"></div></div>
  <div id="tab_seguridad" class="tab-content"><div class="loading"></div></div>
</main>

<!-- modal generico -->
<div class="modal-overlay" id="modal_overlay">
  <div class="modal" id="modal_contenido"></div>
</div>

<!-- toast container -->
<div class="toast-container" id="toast_container"></div>

<!-- scripts -->
<script src="/static/admin_core.js"></script>
<script src="/static/admin_kpi.js"></script>
<script src="/static/admin_usuarios.js"></script>
<script src="/static/admin_perfiles.js"></script>
<script src="/static/admin_pcs.js"></script>
<script src="/static/admin_sesiones.js"></script>
<script src="/static/admin_retiros.js"></script>
<script src="/static/admin_mensajes.js"></script>
<script src="/static/admin_monitoreo.js"></script>
<script src="/static/admin_tokenomia.js"></script>
<script src="/static/admin_proyecciones.js"></script>
<script src="/static/admin_happy_hour.js"></script>
<script src="/static/admin_seguridad.js"></script>

<!-- boot -->
<script>
"use strict";
document.addEventListener("DOMContentLoaded", function () {
  roxy.init();
});
</script>
</body>
</html>
