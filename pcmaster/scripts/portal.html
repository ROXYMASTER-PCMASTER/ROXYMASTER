<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>roxymaster v8.3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/roxymaster.css" rel="stylesheet">
</head>
<body>
  <div id="preloader" class="preloader"><div class="spinner"></div></div>

  <div class="sidebar-overlay" onclick="roxy.toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3 class="mb-0" style="color:var(--accent)">roxymaster v8.3</h3>
      <small class="text-muted" id="usuario_email">admin</small>
    </div>
    <nav>
      <a data-tab="kpi" onclick="roxy.navegar('kpi')"><i class="bi bi-speedometer2"></i> kpi</a>
      <a data-tab="usuarios" onclick="roxy.navegar('usuarios')"><i class="bi bi-people"></i> usuarios</a>
      <a data-tab="perfiles" onclick="roxy.navegar('perfiles')"><i class="bi bi-person-badge"></i> perfiles</a>
      <a data-tab="pcs" onclick="roxy.navegar('pcs')"><i class="bi bi-pc-display"></i> pcs</a>
      <a data-tab="sesiones" onclick="roxy.navegar('sesiones')"><i class="bi bi-clock-history"></i> sesiones</a>
      <a data-tab="retiros" onclick="roxy.navegar('retiros')"><i class="bi bi-cash-coin"></i> retiros</a>
      <a data-tab="mensajes" onclick="roxy.navegar('mensajes')"><i class="bi bi-chat-dots"></i> mensajes <span class="badge bg-danger" id="msg_badge" style="display:none">0</span></a>
      <a data-tab="monitoreo" onclick="roxy.navegar('monitoreo')"><i class="bi bi-activity"></i> monitoreo</a>
      <a data-tab="tokenomia" onclick="roxy.navegar('tokenomia')"><i class="bi bi-coin"></i> tokenomia</a>
      <a data-tab="proyecciones" onclick="roxy.navegar('proyecciones')"><i class="bi bi-graph-up-arrow"></i> proyecciones</a>
      <a data-tab="happy_hour" onclick="roxy.navegar('happy_hour')"><i class="bi bi-star"></i> happy hour</a>
      <a data-tab="seguridad" onclick="roxy.navegar('seguridad')"><i class="bi bi-shield-check"></i> seguridad</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline-secondary btn-sm w-100" onclick="roxy.cerrarSesion()"><i class="bi bi-box-arrow-left"></i> salir</button>
    </div>
  </div>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="btn btn-dark" onclick="roxy.toggleSidebar()"><i class="bi bi-list"></i></button>
      <h5 class="mb-0 ms-3" id="panel_titulo">panel kpi</h5>
      <div class="ms-auto"></div>
    </header>
    <main class="container-fluid p-3" id="main_content">
      <div id="tab_kpi" class="tab-content activo"></div>
      <div id="tab_usuarios" class="tab-content"></div>
      <div id="tab_perfiles" class="tab-content"></div>
      <div id="tab_pcs" class="tab-content"></div>
      <div id="tab_sesiones" class="tab-content"></div>
      <div id="tab_retiros" class="tab-content"></div>
      <div id="tab_mensajes" class="tab-content"></div>
      <div id="tab_monitoreo" class="tab-content"></div>
      <div id="tab_tokenomia" class="tab-content"></div>
      <div id="tab_proyecciones" class="tab-content"></div>
      <div id="tab_happy_hour" class="tab-content"></div>
      <div id="tab_seguridad" class="tab-content"></div>
    </main>
  </div>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast_container"></div>

  <div class="modal fade" id="modal_overlay" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content bg-dark text-light" id="modal_contenido"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/roxymaster.js"></script>
  <script src="/static/panel_kpi.js"></script>
  <script src="/static/panel_admin.js"></script>
  <script src="/static/panel_monitoreo.js"></script>
  <script src="/static/tabla_editable.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      roxy.init();
    });
  </script>
</body>
</html>
