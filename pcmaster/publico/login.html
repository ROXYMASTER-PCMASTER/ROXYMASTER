<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>wafabot · iniciar sesion</title>
  <meta name="description" content="inicia sesion en wafabot y accede a tu panel de ganancias.">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background:#0b0f17;
      color:#e2e8f0;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      position:relative;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(6,182,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none; z-index:0;
    }
    @keyframes shimmer {
      0%{background-position:-200% center;}
      100%{background-position:200% center;}
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes pulseGlow {
      0%,100%{box-shadow:0 0 20px rgba(139,92,246,0.3);}
      50%{box-shadow:0 0 40px rgba(139,92,246,0.6);}
    }
    .container { position:relative; z-index:1; width:100%; max-width:420px; padding:1.5rem; animation:fadeIn 0.6s ease forwards; }
    .logo-link { display:block; text-align:center; margin-bottom:2rem; }
    .logo {
      font-size:2rem; font-weight:900; letter-spacing:2px;
      background:linear-gradient(135deg,#8b5cf6,#06b6d4,#8b5cf6);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite;
    }
    .card {
      background:rgba(21,27,35,0.9); border:1px solid rgba(139,92,246,0.2);
      border-radius:20px; padding:2.5rem 2rem;
      backdrop-filter:blur(12px);
    }
    .card h1 {
      font-size:1.4rem; font-weight:800; text-align:center; margin-bottom:0.3rem;
      background:linear-gradient(135deg,#8b5cf6,#06b6d4);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .card p.sub { text-align:center; color:#8892a4; font-size:0.9rem; margin-bottom:2rem; }
    .card p.sub a { color:#8b5cf6; text-decoration:none; }
    .card p.sub a:hover { text-decoration:underline; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label {
      display:block; font-size:0.8rem; font-weight:600; margin-bottom:0.4rem;
      color:#a0aec0; text-transform:uppercase; letter-spacing:0.5px;
    }
    .input-wrapper { position:relative; display:flex; align-items:center; }
    .input-wrapper input {
      width:100%; padding:0.85rem 1rem; padding-right:2.8rem;
      background:rgba(12,16,22,0.8); border:1px solid rgba(139,92,246,0.25);
      border-radius:12px; color:#e2e8f0; font-size:0.95rem;
      transition:border-color 0.3s, box-shadow 0.3s; outline:none;
    }
    .input-wrapper input:focus {
      border-color:#8b5cf6; box-shadow:0 0 0 3px rgba(139,92,246,0.15);
    }
    .input-wrapper .toggle-pwd {
      position:absolute; right:12px; background:none; border:none;
      color:#8892a4; cursor:pointer; font-size:1rem; padding:0; line-height:1;
    }
    .input-wrapper .toggle-pwd:hover { color:#c0c8d6; }
    .btn-submit {
      width:100%; padding:0.9rem; border:none; border-radius:12px;
      background:linear-gradient(135deg,#a78bfa,#7c3aed);
      color:#fff; font-size:1rem; font-weight:800; cursor:pointer;
      text-shadow:0 1px 3px rgba(0,0,0,0.4);
      letter-spacing:0.5px;
      transition:transform 0.2s, box-shadow 0.3s;
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,58,237,0.5); }
    .btn-submit:active { transform:translateY(0); }
    .msg-box {
      padding:0.75rem; border-radius:10px; font-size:0.85rem; line-height:1.5;
      display:none;
    }
    .msg-box.error { display:block; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:#f87171; margin-bottom:1rem; }
    .msg-box.success { display:block; background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:#4ade80; margin-bottom:1rem; }
    .footer-link { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:#8892a4; }
    .footer-link a { color:#8b5cf6; text-decoration:none; font-weight:600; }
    .footer-link a:hover { text-decoration:underline; }
    .back-link {
      display:inline-flex; align-items:center; gap:6px;
      color:#8892a4; text-decoration:none; font-size:0.85rem;
      margin-bottom:1.5rem; transition:color 0.3s;
    }
    .back-link:hover { color:#8b5cf6; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> volver al inicio</a>
    <a href="index.html" class="logo-link"><div class="logo">wafabot</div></a>
    <div class="card">
      <h1>iniciar sesion</h1>
      <p class="sub">accede a tu panel de <a href="index.html">wafabot</a></p>
      <div id="msg" class="msg-box"></div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="email">correo electronico</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label for="password">contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="contraseña" required autocomplete="current-password">
            <button type="button" class="toggle-pwd" id="toggle-password" aria-label="mostrar contraseña"><i class="far fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-submit">acceder <i class="fas fa-arrow-right"></i></button>
      </form>
      <div class="footer-link">
        ¿no tienes cuenta? <a href="registro.html">crear cuenta gratis</a>
      </div>
    </div>
  </div>
  <script>
    (function() {
      'use strict';
      const msg = document.getElementById('msg');
      const form = document.getElementById('loginForm');

      window.handleLogin = async function(e) {
        e.preventDefault();
        msg.className = 'msg-box';
        msg.style.display = 'none';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!email || !password) {
          msg.className = 'msg-box error';
          msg.textContent = 'completa todos los campos.';
          return false;
        }
        try {
          const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await resp.json();
          if (!resp.ok || !data.exito) {
            msg.className = 'msg-box error';
            msg.textContent = data.detail || data.error || 'error al iniciar sesion';
            return false;
          }
          // guardar token
          localStorage.setItem('token', data.token);
          localStorage.setItem('usuario', JSON.stringify(data.usuario));
          // redirigir al dashboard
          window.location.href = '/publico/dashboard_publico.html';
        } catch (err) {
          msg.className = 'msg-box error';
          msg.textContent = 'error de conexion: ' + err.message;
          return false;
        }
        return false;
      };

      document.getElementById('toggle-password').addEventListener('click', function() {
        var p = document.getElementById('password');
        if (p.type === 'password') {
          p.type = 'text';
          this.innerHTML = '<i class="far fa-eye-slash"></i>';
        } else {
          p.type = 'password';
          this.innerHTML = '<i class="far fa-eye"></i>';
        }
      });
    })();
  </script>
</body>
</html>
