<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>wafabot · iniciar sesion</title>
  <meta name="description" content="inicia sesion en wafabot y accede a tu panel de ganancias.">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background:#0b0f17;
      color:#e2e8f0;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      position:relative;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(6,182,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none; z-index:0;
    }
    @keyframes shimmer {
      0%{background-position:-200% center;}
      100%{background-position:200% center;}
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    @keyframes pulseGlow {
      0%,100%{box-shadow:0 0 20px rgba(139,92,246,0.3);}
      50%{box-shadow:0 0 40px rgba(139,92,246,0.6);}
    }
    .container { position:relative; z-index:1; width:100%; max-width:420px; padding:1.5rem; animation:fadeIn 0.6s ease forwards; }
    .logo-link { display:block; text-align:center; margin-bottom:2rem; }
    .logo {
      font-size:2rem; font-weight:900; letter-spacing:2px;
      background:linear-gradient(135deg,#8b5cf6,#06b6d4,#8b5cf6);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite;
    }
    .card {
      background:rgba(21,27,35,0.9); border:1px solid rgba(139,92,246,0.2);
      border-radius:20px; padding:2.5rem 2rem;
      backdrop-filter:blur(12px);
    }
    .card h1 {
      font-size:1.4rem; font-weight:800; text-align:center; margin-bottom:0.5rem;
      background:linear-gradient(135deg,#8b5cf6,#06b6d4);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .card p { text-align:center; color:#94a3b8; font-size:0.85rem; margin-bottom:1.8rem; }
    .form-group { margin-bottom:1.2rem; }
    .form-group label { display:block; font-size:0.8rem; font-weight:600; color:#94a3b8; margin-bottom:0.4rem; }
    .form-group input {
      width:100%; padding:0.8rem 1rem; border-radius:12px; border:1px solid rgba(139,92,246,0.2);
      background:rgba(11,15,23,0.8); color:#e2e8f0; font-size:0.9rem; outline:none;
      transition:border-color 0.3s, box-shadow 0.3s;
    }
    .form-group input:focus { border-color:#8b5cf6; box-shadow:0 0 20px rgba(139,92,246,0.2); }
    .form-group input::placeholder { color:#475569; }
    .password-wrapper { position:relative; }
    .password-wrapper input { padding-right:3rem!important; }
    .toggle-password {
      position:absolute; right:0.75rem; top:50%; transform:translateY(-50%);
      background:none; border:none; color:#64748b; cursor:pointer; font-size:1.1rem;
      padding:0.25rem; line-height:1; transition:color 0.3s;
    }
    .toggle-password:hover { color:#8b5cf6; }
    .remember-me {
      display:flex; align-items:center; gap:0.5rem; margin:1rem 0 0.5rem;
      font-size:0.8rem; color:#94a3b8; cursor:pointer; user-select:none;
    }
    .remember-me input[type="checkbox"] {
      appearance:none; -webkit-appearance:none;
      width:1.1rem; height:1.1rem; border-radius:4px; border:1px solid rgba(139,92,246,0.4);
      background:rgba(11,15,23,0.8); cursor:pointer; position:relative; flex-shrink:0;
      transition:all 0.3s;
    }
    .remember-me input[type="checkbox"]:checked {
      background:#8b5cf6; border-color:#8b5cf6;
    }
    .remember-me input[type="checkbox"]:checked::after {
      content:'✓'; position:absolute; inset:0; display:flex; align-items:center;
      justify-content:center; color:#fff; font-size:0.75rem; font-weight:700;
    }
    .btn {
      width:100%; padding:0.85rem; border-radius:12px; font-weight:700; font-size:0.95rem;
      cursor:pointer; transition:all 0.3s; border:none; display:block; text-align:center; margin-top:0.5rem;
    }
    .btn-primary {
      background:linear-gradient(135deg,#8b5cf6,#06b6d4);
      color:#fff; box-shadow:0 4px 15px rgba(139,92,246,0.4);
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(139,92,246,0.6); }
    .btn-secondary {
      background:transparent; color:#8b5cf6; border:1px solid rgba(139,92,246,0.5);
    }
    .btn-secondary:hover { background:rgba(139,92,246,0.1); border-color:#8b5cf6; transform:translateY(-2px); }
    .extra-links { text-align:center; margin-top:1.5rem; }
    .extra-links a { color:#64748b; font-size:0.8rem; transition:color 0.3s; margin:0 0.5rem; }
    .extra-links a:hover { color:#8b5cf6; }
    .error-msg {
      display:none; padding:0.7rem 1rem; border-radius:10px; background:rgba(239,68,68,0.1);
      border:1px solid rgba(239,68,68,0.3); color:#f87171; font-size:0.8rem; margin-bottom:1rem; text-align:center;
    }
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background:#0b0f17; }
    ::-webkit-scrollbar-thumb { background:#8b5cf6; border-radius:4px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo-link"><div class="logo">wafabot</div></a>
    <div class="card">
      <h1>bienvenido de vuelta</h1>
      <p>ingresa tus credenciales para continuar</p>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">usuario o correo electronico</label>
          <input type="text" id="email" placeholder="usuario o email" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">contrasena</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="toggle-password" aria-label="ver contrasena">👁</button>
          </div>
        </div>
        <label class="remember-me">
          <input type="checkbox" id="recordar" checked>
          recordar sesion
        </label>
        <button type="submit" class="btn btn-primary">iniciar sesion</button>
      </form>
      <div class="extra-links">
        <a href="/registro">crear cuenta gratis</a>
        <span style="color:#475569;">·</span>
        <a href="/">volver al inicio</a>
      </div>
    </div>
  </div>
  <script>
    (function(){
      document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errorEl = document.getElementById('error-msg');
        var btn = this.querySelector('button[type="submit"]');
        if (!email || !password) {
          errorEl.textContent = 'completa todos los campos';
          errorEl.style.display = 'block';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'accediendo...';
        try {
          var resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
          });
          var data = await resp.json();
          if (resp.ok && data.token) {
            var storage = document.getElementById('recordar').checked ? localStorage : sessionStorage;
            storage.setItem('token', data.token);
            if (data.rol === 'admin' || data.rol === 'superadmin') {
              window.location.href = '/privado/dashboard_admin.html?token=' + data.token;
            } else {
              window.location.href = '/publico/dashboard_publico.html?token=' + data.token;
            }
          } else {
            errorEl.textContent = data.detalle || data.error || 'credenciales invalidas';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'iniciar sesion';
          }
        } catch(err) {
          errorEl.textContent = 'error de conexion. intenta de nuevo.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'iniciar sesion';
        }
      });
      document.getElementById('toggle-password').addEventListener('click', function() {
        var p = document.getElementById('password');
        if (p.type === 'password') { p.type = 'text'; this.textContent = '🙈'; }
        else { p.type = 'password'; this.textContent = '👁'; }
      });
    })();
  </script>
</body>
</html>
