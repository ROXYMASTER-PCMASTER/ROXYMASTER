<!-- ===== MODAL BETA ===== -->
<div class="modal-overlay" id="betaModal">
  <div class="modal-container">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-header">
      <i class="fas fa-rocket"></i>
      <h3>solicita tu acceso anticipado</h3>
      <p>se parte de los primeros en probar wafabot. cupos limitados.</p>
    </div>
    <div class="modal-body">
      <form id="modal-form" novalidate>
        <div class="form-group"><label for="modal-name">nombre completo</label><input type="text" id="modal-name" placeholder="tu nombre" required><span class="form-error" id="modal-name-error"></span></div>
        <div class="form-group"><label for="modal-email">correo electronico</label><input type="email" id="modal-email" placeholder="tu@email.com" required><span class="form-error" id="modal-email-error"></span></div>
        <div class="form-group"><label for="modal-password">contraseña</label><input type="password" id="modal-password" placeholder="minimo 6 caracteres" minlength="6" required><span class="form-error" id="modal-password-error"></span></div>
        <div class="form-group"><label for="modal-type">tipo de usuario</label><select id="modal-type" required><option value="">selecciona...</option><option value="streamer">streamer / creador</option><option value="agencia">agencia de marketing</option><option value="otro">otro</option></select></div>
        <button type="submit" class="btn btn-cta btn-block">enviar solicitud</button>
      </form>
      <div class="modal-success" id="modal-success" style="display:none">
        <i class="fas fa-check-circle" style="font-size:3rem;color:#00ff88;margin-bottom:10px"></i>
        <h4>solicitud enviada!</h4>
        <p>te contactaremos pronto con instrucciones para acceder a la beta.</p>
      </div>
    </div>
  </div>
</div>
