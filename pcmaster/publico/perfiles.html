<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>perfiles - roxymaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#0d0d2b 0%,#1a0533 30%,#0a1628 60%,#0d2137 100%);padding:2.5rem 1.5rem 2rem;text-align:center;border-bottom:1px solid rgba(0,255,136,0.1);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60%;left:-40%;width:180%;height:180%;background:radial-gradient(circle at 30% 40%,rgba(124,58,237,0.12) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(0,255,136,0.06) 0%,transparent 40%);pointer-events:none}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7c3aed,#00ff88,#ff6b35,transparent);animation:headerGlow 3s ease-in-out infinite}
@keyframes headerGlow{0%,100%{opacity:0.6}50%{opacity:1}}
.header-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:1.25rem;flex-wrap:wrap}
.header-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#00ff88);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.4rem;color:#fff;flex-shrink:0;box-shadow:0 0 20px rgba(124,58,237,0.4),0 0 40px rgba(0,255,136,0.2);animation:avatarPulse 3s ease-in-out infinite}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.4),0 0 40px rgba(0,255,136,0.2)}50%{box-shadow:0 0 30px rgba(124,58,237,0.6),0 0 60px rgba(0,255,136,0.3)}}
.header-text{text-align:left}
.header h1{font-size:1.85rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(90deg,#00ff88,#7c3aed,#ff6b35);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease-in-out infinite}
@keyframes gradientShift{0%,100%{background-position:0% center}50%{background-position:100% center}}
.header .subtitle{font-size:0.9rem;color:#94a3b8;margin-top:0.3rem;max-width:500px;line-height:1.5;letter-spacing:0.3px}
.header .subtitle span{color:#00ff88;font-weight:600}
.header .user-info{margin-top:0.75rem;font-size:0.8rem;color:#64748b}
.header .user-info span{margin:0 0.5rem}
.header .user-info .badge{display:inline-block;padding:0.15rem 0.6rem;border-radius:20px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:linear-gradient(135deg,#7c3aed33,#00ff8822);border:1px solid rgba(124,58,237,0.3);-webkit-text-fill-color:#a78bfa;color:#a78bfa}
.perfiles-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;padding:1.5rem;max-width:1200px;margin:0 auto}
.perfil-card{background:linear-gradient(145deg,#111133,#0f0f25);border-radius:16px;padding:1.35rem 1.25rem;border:1px solid rgba(124,58,237,0.2);transition:all 0.4s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;animation:cardFadeIn 0.5s ease both}
.perfil-card:nth-child(1){animation-delay:0.05s}.perfil-card:nth-child(2){animation-delay:0.1s}.perfil-card:nth-child(3){animation-delay:0.15s}.perfil-card:nth-child(4){animation-delay:0.2s}
@keyframes cardFadeIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.perfil-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 0%,rgba(0,255,136,0.06) 0%,transparent 50%);pointer-events:none}
.perfil-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7c3aed,#00ff88);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease}
.perfil-card:hover{border-color:rgba(0,255,136,0.4);transform:translateY(-4px) scale(1.02);box-shadow:0 12px 40px rgba(0,255,136,0.15),0 0 60px rgba(124,58,237,0.08)}
.perfil-card:hover::after{transform:scaleX(1)}
.perfil-card .p-icon{font-size:0.7rem;color:#7c3aed;margin-bottom:0.3rem}
.perfil-card .p-label{font-size:0.78rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:0.5rem;font-weight:600}
.perfil-card .p-value{font-size:1.65rem;font-weight:800;background:linear-gradient(90deg,#00ff88,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.perfil-card .p-sub{font-size:0.82rem;color:#94a3b8;margin-top:0.25rem}
.perfiles-actions{display:flex;gap:0.75rem;flex-wrap:wrap;max-width:1200px;margin:0 auto 1.5rem;padding:0 1.5rem}
.btn-action{padding:0.75rem 2rem;background:linear-gradient(135deg,#00ff88,#7c3aed);color:#0a0a1a;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.3s ease;text-transform:uppercase;letter-spacing:0.8px;box-shadow:0 4px 15px rgba(0,255,136,0.2),0 0 30px rgba(124,58,237,0.1);flex:1;min-width:160px;text-align:center}
.btn-action:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,255,136,0.4),0 0 40px rgba(124,58,237,0.2)}
.btn-outline{background:transparent;border:1px solid rgba(124,58,237,0.4);color:#a78bfa;box-shadow:none}
.btn-outline:hover{background:rgba(124,58,237,0.1);border-color:#00ff88;color:#00ff88;box-shadow:0 0 20px rgba(0,255,136,0.1)}
.perfiles-section{max-width:1200px;margin:0 auto 2rem;padding:0 1.5rem}
.perfiles-section h2{font-size:1.15rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;background:linear-gradient(90deg,#00ff88,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.perfiles-table{width:100%;background:linear-gradient(145deg,#111133,#0f0f25);border-radius:16px;border:1px solid rgba(124,58,237,0.2);overflow:hidden}
.pf-group{background:rgba(124,58,237,0.06);padding:0.75rem 1.25rem;border-bottom:1px solid rgba(124,58,237,0.15);display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem 1.5rem;font-size:0.8rem}
.pf-group .pcbot-id{font-weight:700;color:#a78bfa;font-size:0.9rem}
.pf-group .stats{color:#94a3b8;font-size:0.75rem}
.pf-group .stats span{color:#00ff88;font-weight:600}
.pf-group .stats .inactive{color:#ff3366}
.pf-row{display:grid;grid-template-columns:0.6fr 1fr 0.7fr 0.7fr 0.7fr 0.7fr 1.2fr;padding:0.7rem 1.25rem;border-bottom:1px solid rgba(124,58,237,0.08);font-size:0.82rem;transition:background 0.3s;align-items:center}
.pf-row:hover{background:rgba(124,58,237,0.05)}
.pf-row.header{color:#64748b;font-weight:700;text-transform:uppercase;font-size:0.72rem;letter-spacing:0.8px;background:rgba(124,58,237,0.1);border-bottom:1px solid rgba(124,58,237,0.2);grid-template-columns:0.6fr 1fr 0.7fr 0.7fr 0.7fr 0.7fr 1.2fr}
.pf-row.footer{color:#64748b;font-size:0.72rem;background:rgba(0,255,136,0.04);grid-template-columns:1fr;text-align:right;padding:0.5rem 1.25rem}
.pf-estado{font-size:0.75rem;padding:0.2rem 0.6rem;border-radius:8px;text-align:center;display:inline-block}
.pf-estado.activo{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.2)}
.pf-estado.inactivo{background:rgba(255,51,102,0.1);color:#ff3366;border:1px solid rgba(255,51,102,0.2)}
.pf-tipo{color:#a78bfa;font-weight:600}
.pf-nombre{color:#94a3b8;word-break:break-all;font-family:'Courier New',monospace;font-size:0.75rem}
.pf-horas{color:#94a3b8}
.pf-ultimo{font-size:0.72rem;color:#64748b}
.pf-hash{font-size:0.7rem;color:#484f58;font-family:'Courier New',monospace}
@media(max-width:768px){
.perfiles-summary{grid-template-columns:repeat(2,1fr);padding:1rem;gap:0.75rem}
.pf-row,.pf-row.header{grid-template-columns:1fr 0.8fr 0.6fr 0.6fr 0.8fr 1fr;font-size:0.72rem;padding:0.6rem 0.8rem}
.pf-hash,.pf-ultimo{display:none}
.header{padding:1.75rem 1rem 1.5rem}.header h1{font-size:1.45rem}.header-avatar{width:44px;height:44px;font-size:1.1rem}
}
@media(max-width:480px){
.perfiles-summary{grid-template-columns:1fr}
.header-content{flex-direction:column;text-align:center}.header-text{text-align:center}
.pf-row,.pf-row.header{grid-template-columns:1fr 0.6fr 0.5fr 0.5fr 0.7fr;font-size:0.68rem;padding:0.5rem 0.6rem}
.pf-row.header{display:none}.perfiles-actions{flex-direction:column}
.pf-hash,.pf-ultimo,.pf-tipo{display:none}
}
</style>
</head>
<body>
<header class="header">
<div class="header-content">
<div class="header-avatar">p</div>
<div class="header-text">
<h1>perfiles</h1>
<p class="subtitle">gestiona tus <span>perfiles de mineria</span> conectados al sistema roxymaster.</p>
</div>
</div>
<div class="user-info">
<span id="user-email">---</span>
<span>|</span>
<span class="badge" id="user-rol">---</span>
</div>
</header>

<div class="perfiles-summary">
<div class="perfil-card"><span class="p-icon">▲</span><div class="p-label">perfiles activos</div><div class="p-value" id="pf-activos">0</div></div>
<div class="perfil-card"><span class="p-icon">■</span><div class="p-label">perfiles totales</div><div class="p-value" id="pf-totales">0</div></div>
<div class="perfil-card"><span class="p-icon">●</span><div class="p-label">horas conectadas</div><div class="p-value" id="pf-horas">0</div><div class="p-sub">horas totales de conexion</div></div>
<div class="perfil-card"><span class="p-icon">✦</span><div class="p-label">tiempo promedio</div><div class="p-value" id="pf-promedio">0h</div><div class="p-sub">horas promedio por perfil</div></div>
</div>

<div class="perfiles-actions">
<button id="btnAgregarPerfil" class="btn-action">✦ agregar perfil</button>
<button class="btn-action btn-outline" onclick="cargarPerfiles()">↻ recargar</button>
</div>

<div class="perfiles-section">
<h2>lista de perfiles</h2>
<div class="perfiles-table">
<div id="pf-list">
<div class="pf-row" style="color:#64748b;grid-column:1/-1;text-align:center;padding:2rem;">cargando perfiles...</div>
</div>
</div>
</div>

<script>
// carga inicial
(function() {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', cargarPerfiles);
  } else {
    cargarPerfiles();
  }
})();

// funcion crear perfil (llamada desde el modal del dashboard)
window.crearPerfil = async function() {
  var apiKey = document.getElementById('apiKeyRoxy').value;
  if (!apiKey || apiKey.trim() === '') {
    if (typeof ui !== 'undefined' && ui._showError) {
      ui._showError('ingresa una api key valida');
    }
    return;
  }
  try {
    var r = await ui.api.post('/perfiles/crear', { api_key: apiKey.trim() });
    if (r.exito !== false) {
      ui._showSuccess('perfil creado exitosamente');
      cerrarModal('modalAgregarPerfil');
      document.getElementById('apiKeyRoxy').value = '';
      cargarPerfiles();
    } else {
      ui._showError(r.mensaje || r.detail || 'error al crear perfil');
    }
  } catch(e) {
    if (typeof ui !== 'undefined' && ui._showError) {
      ui._showError('error: ' + (e.message || 'desconocido'));
    }
  }
};

// funciones de accion sobre perfiles
window.iniciarPerfil = async function(id) {
  try {
    var r = await ui.api.post('/perfiles/' + id + '/iniciar');
    if (r.exito !== false) {
      ui._showSuccess('perfil iniciado');
      cargarPerfiles();
    } else {
      ui._showError(r.mensaje || 'error al iniciar perfil');
    }
  } catch(e) { ui._showError('error: ' + e.message); }
};

window.detenerPerfil = async function(id) {
  try {
    var r = await ui.api.post('/perfiles/' + id + '/detener');
    if (r.exito !== false) {
      ui._showSuccess('perfil detenido');
      cargarPerfiles();
    } else {
      ui._showError(r.mensaje || 'error al detener perfil');
    }
  } catch(e) { ui._showError('error: ' + e.message); }
};

window.eliminarPerfil = async function(id) {
  if (!confirm('confirmas eliminar este perfil?')) return;
  try {
    var r = await ui.api.post('/perfiles/' + id + '/eliminar');
    if (r.exito !== false) {
      ui._showSuccess('perfil eliminado');
      cargarPerfiles();
    } else {
      ui._showError(r.mensaje || 'error al eliminar perfil');
    }
  } catch(e) { ui._showError('error: ' + e.message); }
};

async function cargarPerfiles() {
  try {
    const d = await ui.api.get('/dashboard');
    if (d.exito) {
      document.getElementById('user-email').textContent = d.usuario?.email || '---';
      document.getElementById('user-rol').textContent = d.usuario?.rol || '---';
      document.getElementById('pf-activos').textContent = d.perfiles_activos || 0;
      document.getElementById('pf-totales').textContent = d.perfiles_totales || 0;
      var h = parseFloat(d.horas_conexion || 0);
      document.getElementById('pf-horas').textContent = h.toFixed(1);
      var total = parseInt(d.perfiles_totales || 0);
      document.getElementById('pf-promedio').textContent = total > 0 ? (h/total).toFixed(1) + 'h' : '0h';
    }
  } catch(e) { console.error('error cargando perfiles dashboard:', e); }

  try {
    const r = await ui.api.get('/perfiles');
    var list = document.getElementById('pf-list');
    if (!r.exito || !r.computadoras || r.computadoras.length === 0) {
      list.innerHTML = '<div class="pf-row" style="color:#64748b;grid-column:1/-1;text-align:center;padding:2rem;">no tienes perfiles vinculados. agrega uno para empezar a minar</div>';
      return;
    }

    var totalActivosGlobal = 0;
    var totalPerfilesGlobal = 0;
    var totalHorasGlobal = 0;
    var htmlPiezas = [];

    r.computadoras.forEach(function(pc, idx) {
      var pcId = pc.pcbot_id || 'pc-' + idx;
      var activos = pc.activos || 0;
      var inactivos = pc.inactivos || 0;
      var totalPf = pc.total_perfiles || 0;
      var horas = parseFloat(pc.horas_conectado || 0).toFixed(1);

      totalActivosGlobal += activos;
      totalPerfilesGlobal += totalPf;
      totalHorasGlobal += parseFloat(pc.horas_conectado || 0);

      // bloque visual de grupo pc
      htmlPiezas.push(
        '<div class="pf-group">' +
          '<span class="pcbot-id">' + pcId + '</span>' +
          '<span class="stats">' + totalPf + ' perfiles | ' +
            '<span>' + activos + ' activos</span>' +
            ' / <span class="inactive">' + inactivos + ' inactivos</span>' +
          '</span>' +
          '<span class="stats">horas conectado: ' + horas + 'h</span>' +
        '</div>'
      );

      // fila header
      htmlPiezas.push(
        '<div class="pf-row header">' +
          '<span>hash_id</span><span>nombre</span><span>tipo</span><span>estado</span><span>horas</span><span>ultimo heartbeat</span><span>accion</span>' +
        '</div>'
      );

      // perfiles de esta pc
      if (!pc.perfiles || pc.perfiles.length === 0) {
        htmlPiezas.push(
          '<div class="pf-row" style="color:#64748b;grid-column:1/-1;text-align:center;padding:0.8rem;">sin perfiles en esta pc</div>'
        );
      } else {
        pc.perfiles.forEach(function(pf) {
          var est = (pf.estado || 'inactivo').toLowerCase();
          var nombre = pf.nombre_perfil || pf.name_id || '---';
          var hash = pf.hash_id || '---';
          var horasPf = parseFloat(pf.horas_conexion || 0).toFixed(1);
          var ultimo = pf.ultimo_heartbeat || '---';
          var id = pf.id;

          htmlPiezas.push(
            '<div class="pf-row">' +
              '<span class="pf-hash">' + hash.substring(0, 16) + '...</span>' +
              '<span class="pf-nombre">' + nombre + '</span>' +
              '<span class="pf-tipo">' + (pf.tipo || 'roxy') + '</span>' +
              '<span class="pf-estado ' + est + '">' + est + '</span>' +
              '<span class="pf-horas">' + horasPf + 'h</span>' +
              '<span class="pf-ultimo">' + ultimo + '</span>' +
              '<span class="pf-acciones">' +
                (est === 'inactivo' ? '<button class="btn-action" style="padding:0.25rem 0.7rem;font-size:0.7rem;margin-right:0.25rem;" onclick="iniciarPerfil(' + id + ')">iniciar</button>' : '') +
                (est === 'activo' ? '<button class="btn-action" style="padding:0.25rem 0.7rem;font-size:0.7rem;margin-right:0.25rem;background:#ff3366;" onclick="detenerPerfil(' + id + ')">detener</button>' : '') +
                '<button class="btn-action" style="padding:0.25rem 0.7rem;font-size:0.7rem;background:#ef4444;" onclick="eliminarPerfil(' + id + ')">eliminar</button>' +
              '</span>' +
            '</div>'
          );
        });
      }

      // footer del grupo
      htmlPiezas.push(
        '<div class="pf-row footer">' +
          'total activos: ' + activos + ' | total perfiles: ' + totalPf +
        '</div>'
      );
    });

    // resumen global al final
    htmlPiezas.push(
      '<div class="pf-row footer" style="background:rgba(124,58,237,0.08);font-weight:600;color:#c9d1d9;">' +
        'total global - activos: ' + totalActivosGlobal + ' | total perfiles: ' + totalPerfilesGlobal + ' | horas: ' + totalHorasGlobal.toFixed(1) + 'h' +
      '</div>'
    );

    list.innerHTML = htmlPiezas.join('');
  } catch(e) {
    console.error('error cargando lista perfiles:', e);
  }
}
</script>
</body>
</html>
