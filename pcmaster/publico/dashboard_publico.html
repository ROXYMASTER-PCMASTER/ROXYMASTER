<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>panel del granjero - roxymaster</title>
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{display:none;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;display:flex}
  /* sidebar */
  .sidebar{
    width:220px;min-height:100vh;background:linear-gradient(180deg,#0d0d2b 0%,#1a0533 40%,#0a1628 70%);
    border-right:1px solid rgba(124,58,237,0.15);padding:1.25rem 0;display:flex;flex-direction:column;
    position:fixed;left:0;top:0;z-index:100;overflow-y:auto;transition:transform 0.3s ease;
  }
  .sidebar-logo{
    padding:0 1rem 1.25rem;border-bottom:1px solid rgba(124,58,237,0.1);margin-bottom:0.75rem;
    text-align:center;
  }
  .sidebar-logo h2{
    font-size:1.2rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;
    background:linear-gradient(90deg,#00ff88,#7c3aed,#ff6b35);background-size:200% auto;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:gradientShift 4s ease-in-out infinite;
  }
  .sidebar-logo .slogan{font-size:0.6rem;color:#64748b;margin-top:0.2rem;letter-spacing:1px;text-transform:uppercase}
  @keyframes gradientShift{0%,100%{background-position:0% center}50%{background-position:100% center}}
  .sidebar-user{
    padding:0.75rem 1rem;margin:0 0.5rem 0.75rem;
    background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(0,255,136,0.06));
    border-radius:10px;border:1px solid rgba(124,58,237,0.15);text-align:center;
  }
  .sidebar-user .user-name{font-size:0.82rem;font-weight:700;color:#e2e8f0;word-break:break-all}
  .sidebar-user .user-badge{
    display:inline-block;margin-top:0.25rem;padding:0.1rem 0.5rem;border-radius:20px;
    font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;
    background:linear-gradient(135deg,#7c3aed33,#00ff8822);border:1px solid rgba(124,58,237,0.3);
    -webkit-text-fill-color:#a78bfa;color:#a78bfa;
  }
  .sidebar-nav{flex:1;display:flex;flex-direction:column;gap:0.2rem;padding:0 0.5rem}
  .sidebar-link{
    display:flex;align-items:center;gap:0.7rem;padding:0.7rem 0.9rem;border-radius:10px;
    color:#94a3b8;font-size:0.82rem;font-weight:600;cursor:pointer;text-decoration:none;
    transition:all 0.25s ease;border:none;background:none;width:100%;text-align:left;letter-spacing:0.3px;
  }
  .sidebar-link:hover{background:rgba(124,58,237,0.1);color:#a78bfa}
  .sidebar-link.active{
    background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(124,58,237,0.15));
    color:#00ff88;border:1px solid rgba(0,255,136,0.2);
  }
  .sidebar-link .icon{width:20px;text-align:center;font-size:0.9rem;flex-shrink:0}
  .sidebar-link .badge-nav{
    margin-left:auto;background:rgba(0,255,136,0.15);color:#00ff88;
    padding:0.05rem 0.45rem;border-radius:8px;font-size:0.65rem;font-weight:700;
  }
  .sidebar-footer{
    padding:0.75rem 1rem;border-top:1px solid rgba(124,58,237,0.1);margin-top:auto;
  }
  .sidebar-footer .btn-logout{
    width:100%;padding:0.55rem;background:rgba(255,51,102,0.1);border:1px solid rgba(255,51,102,0.2);
    color:#ff3366;border-radius:10px;cursor:pointer;font-size:0.75rem;font-weight:700;
    text-transform:uppercase;letter-spacing:0.5px;transition:all 0.3s;
  }
  .sidebar-footer .btn-logout:hover{background:rgba(255,51,102,0.2)}
  /* main content */
  .main-content{
    margin-left:220px;flex:1;padding:2rem 1.5rem;min-height:100vh;
    background:radial-gradient(ellipse at 20% 20%,rgba(124,58,237,0.04) 0%,transparent 50%),
                radial-gradient(ellipse at 80% 80%,rgba(0,255,136,0.03) 0%,transparent 50%);
  }
  /* spinner */
  .spinner-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh}
  .spinner-ring{width:48px;height:48px;border:3px solid rgba(124,58,237,0.15);border-top-color:#00ff88;border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner-text{margin-top:1rem;color:#64748b;font-size:0.85rem}
  /* kpi grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
  .kpi-card{
    background:linear-gradient(135deg,rgba(21,27,47,0.9),rgba(15,10,40,0.9));
    border:1px solid rgba(124,58,237,0.12);border-radius:14px;padding:1.1rem 1rem;
    cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;
  }
  .kpi-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,#00ff88,transparent);
    opacity:0;transition:opacity 0.3s;
  }
  .kpi-card:hover{transform:translateY(-3px);border-color:rgba(0,255,136,0.2);box-shadow:0 8px 30px rgba(0,255,136,0.08)}
  .kpi-card:hover::before{opacity:1}
  .kpi-label{font-size:0.68rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.4rem}
  .kpi-value{font-size:1.3rem;font-weight:800;color:#f1f5f9}
  .kpi-value .green{color:#00ff88}
  .kpi-value .red{color:#ff3366}
  .kpi-value .small{font-size:0.75rem;font-weight:400;color:#94a3b8}
  .kpi-sub{font-size:0.7rem;color:#64748b;margin-top:0.2rem}
  /* header section */
  .dashboard-header{
    margin-bottom:2rem;padding:1.5rem 1.5rem;border-radius:16px;
    background:linear-gradient(135deg,rgba(0,255,136,0.05),rgba(124,58,237,0.08),rgba(255,107,53,0.04));
    border:1px solid rgba(0,255,136,0.08);position:relative;overflow:hidden;
  }
  .dashboard-header::after{
    content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;
    background:radial-gradient(circle,rgba(0,255,136,0.06) 0%,transparent 70%);
    pointer-events:none;
  }
  .dashboard-header h1{font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem}
  .dashboard-header p{font-size:0.85rem;color:#94a3b8;line-height:1.5}
  /* fidelidad */
  .fidelidad-card{
    background:linear-gradient(135deg,rgba(21,27,47,0.9),rgba(15,10,40,0.9));
    border:1px solid rgba(124,58,237,0.12);border-radius:14px;padding:1.25rem;margin-bottom:1.5rem;
  }
  .fidelidad-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
  .fidelidad-header h3{font-size:0.75rem;color:#64748b;text-transform:uppercase;letter-spacing:1px}
  .fidelidad-header .nivel{font-size:1rem;font-weight:800;color:#a78bfa;text-transform:capitalize}
  .fidelidad-bar-bg{
    height:10px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;position:relative;
  }
  .fidelidad-bar{
    height:100%;border-radius:10px;background:linear-gradient(90deg,#00ff88,#7c3aed);
    transition:width 1s ease;position:relative;
  }
  .fidelidad-bar::after{
    content:'';position:absolute;top:0;right:0;width:20px;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));
    border-radius:0 10px 10px 0;
  }
  .fidelidad-texto{font-size:0.75rem;color:#64748b;margin-top:0.5rem;font-style:italic}
  /* modo card */
  .modo-card{
    background:linear-gradient(135deg,rgba(21,27,47,0.9),rgba(15,10,40,0.9));
    border:1px solid rgba(124,58,237,0.12);border-radius:14px;padding:1.25rem;margin-bottom:1.5rem;
    display:flex;justify-content:space-between;align-items:center;
  }
  .modo-info{display:flex;align-items:center;gap:0.75rem}
  .modo-dot{width:10px;height:10px;border-radius:50%;display:inline-block;transition:all 0.3s;flex-shrink:0}
  .modo-dot.activo{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.5)}
  .modo-dot.inactivo{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,0.5)}
  .modo-text{font-size:0.9rem;font-weight:700;transition:color 0.3s}
  .modo-btn{
    padding:0.45rem 1.2rem;border-radius:10px;font-size:0.75rem;font-weight:700;cursor:pointer;
    border:1px solid rgba(124,58,237,0.2);background:rgba(124,58,237,0.1);color:#a78bfa;
    transition:all 0.3s;text-transform:uppercase;letter-spacing:0.5px;
  }
  .modo-btn:hover{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4)}
  /* row inferior */
  .row-inferior{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
  @media(max-width:768px){.row-inferior{grid-template-columns:1fr}}
  /* codigo referido */
  .codigo-card{
    background:linear-gradient(135deg,rgba(21,27,47,0.9),rgba(15,10,40,0.9));
    border:1px solid rgba(124,58,237,0.12);border-radius:14px;padding:1.25rem;
  }
  .codigo-card h3{font-size:0.75rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem}
  .codigo-valor{
    font-size:1.1rem;font-weight:800;color:#00ff88;letter-spacing:2px;
    background:rgba(0,255,136,0.06);padding:0.4rem 0.8rem;border-radius:8px;
    display:inline-block;border:1px dashed rgba(0,255,136,0.2);
  }
  /* comprar rapidamente */
  .comprar-rapido{
    background:linear-gradient(135deg,rgba(21,27,47,0.9),rgba(15,10,40,0.9));
    border:1px solid rgba(124,58,237,0.12);border-radius:14px;padding:1.25rem;
    display:flex;flex-direction:column;justify-content:center;
  }
  .comprar-rapido h3{font-size:0.75rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem}
  .comprar-rapido .btn-comprar{
    display:inline-block;padding:0.65rem 1.5rem;border-radius:10px;font-size:0.85rem;font-weight:700;
    background:linear-gradient(135deg,#00ff88,#7c3aed);color:#0a0a1a;cursor:pointer;border:none;
    box-shadow:0 4px 15px rgba(0,255,136,0.15);transition:all 0.3s;
    text-transform:uppercase;letter-spacing:0.5px;
  }
  .comprar-rapido .btn-comprar:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,255,136,0.3)}
  /* sidebar mobile */
  .sidebar-toggle{
    display:none;position:fixed;top:0.75rem;left:0.75rem;z-index:200;
    background:rgba(21,27,47,0.95);border:1px solid rgba(124,58,237,0.2);color:#e2e8f0;
    padding:0.5rem 0.7rem;border-radius:8px;font-size:1.2rem;cursor:pointer;
  }
  .sidebar-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;
  }
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.mobile-open{transform:translateX(0)}
    .sidebar-toggle{display:block}
    .sidebar-overlay.show{display:block}
    .main-content{margin-left:0;padding:1rem}
    .kpi-grid{grid-template-columns:repeat(2,1fr);gap:0.75rem}
  }
  /* modal comprar */
  .modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;
    align-items:center;justify-content:center;
  }
  .modal-overlay.show{display:flex}
  .modal-content{
    background:linear-gradient(135deg,#1a1a3e,#0a0a1a);border:1px solid rgba(124,58,237,0.2);
    border-radius:16px;padding:2rem;width:90%;max-width:400px;max-height:90vh;overflow-y:auto;
    animation:fadeIn 0.3s ease;position:relative;
  }
  @keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  .modal-content h2{font-size:1.2rem;font-weight:800;color:#e2e8f0;margin-bottom:1.25rem;
    background:linear-gradient(90deg,#00ff88,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .modal-content label{display:block;font-size:0.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem}
  .modal-content input,.modal-content select{
    width:100%;padding:0.65rem 0.8rem;border-radius:10px;border:1px solid rgba(124,58,237,0.2);
    background:#0a0a1a;color:#e2e8f0;font-size:0.9rem;outline:none;margin-bottom:1rem;
    transition:border-color 0.3s;
  }
  .modal-content input:focus,.modal-content select:focus{border-color:#00ff88}
  .modal-content .preview{font-size:1.1rem;font-weight:700;color:#a78bfa;margin-bottom:1rem;padding:0.5rem 0}
  .modal-actions{display:flex;gap:0.75rem;margin-top:0.5rem}
  .modal-actions button{flex:1;padding:0.7rem;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.3s;border:none;text-transform:uppercase;letter-spacing:0.5px}
  .btn-primary{background:linear-gradient(135deg,#00ff88,#7c3aed);color:#0a0a1a;box-shadow:0 4px 15px rgba(0,255,136,0.2)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,255,136,0.4)}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
  .btn-secondary{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);color:#94a3b8}
  .btn-secondary:hover{background:rgba(124,58,237,0.2);color:#a78bfa}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:0.3rem;vertical-align:middle}
  /* --- modales flotantes (perfiles, marketplace) --- */
.modal-flotante{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:500;align-items:center;justify-content:center}
.modal-flotante.show{display:flex}
.modal-contenido{background:linear-gradient(135deg,#1a1a3e,#0a0a1a);border:1px solid rgba(124,58,237,0.2);border-radius:16px;padding:2rem;width:90%;max-width:400px;max-height:90vh;overflow-y:auto;animation:fadeIn 0.3s ease;position:relative}
.cerrar-modal{position:absolute;top:0.5rem;right:1rem;font-size:1.5rem;cursor:pointer;color:#94a3b8}
.cerrar-modal:hover{color:#ff3366}
.btn-accion{padding:0.7rem 1.5rem;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00ff88,#7c3aed);color:#0a0a1a;border:none;box-shadow:0 4px 15px rgba(0,255,136,0.15);transition:all 0.3s;text-transform:uppercase;letter-spacing:0.5px}
.btn-accion:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,255,136,0.3)}
.btn-accion-secondary{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);color:#94a3b8}
.btn-accion-secondary:hover{background:rgba(124,58,237,0.2);color:#a78bfa}</style>
</head>
<body>
  <!-- sidebar toggle (mobile) -->
  <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2>roxymaster</h2>
      <div class="slogan">panel del granjero</div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="s-user-email">---</div>
      <div class="user-badge" id="s-user-rol">---</div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" data-panel="dashboard" onclick="cargarPanel('dashboard',this)">
        <span class="icon">◆</span> dashboard
      </button>
      <button class="sidebar-link" data-panel="wallet" onclick="cargarPanel('wallet',this)">
        <span class="icon">■</span> wallet
      </button>
      <button class="sidebar-link" data-panel="marketplace" onclick="cargarPanel('marketplace',this)">
        <span class="icon">▲</span> marketplace
      </button>
      <button class="sidebar-link" data-panel="referidos" onclick="cargarPanel('referidos',this)">
        <span class="icon">✦</span> referidos
        <span class="badge-nav" id="badge-ref">0</span>
      </button>
      <button class="sidebar-link" data-panel="perfiles" onclick="cargarPanel('perfiles',this)">
        <span class="icon">●</span> perfiles
        <span class="badge-nav" id="badge-pf">0</span>
      </button>
      <button class="sidebar-link" data-panel="ayuda" onclick="cargarPanel('ayuda',this)">
        <span class="icon">?</span> ayuda
      </button>
      <button class="sidebar-link" data-panel="endpoints" onclick="cargarPanel('endpoints',this)">
        <span class="icon">#</span> endpoints
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="cerrarSesion()">✕ cerrar sesion</button>
    </div>
  </aside>

  <!-- main content -->
  <main class="main-content" id="main-content">
    <div id="panel-container">
      <div class="spinner-container">
        <div class="spinner-ring"></div>
        <div class="spinner-text">cargando panel del granjero...</div>
      </div>
    </div>
  </main>

  <!-- toast container -->
  <div id="toast-container"></div>

  <!-- modal compra -->
  <div class="modal-overlay" id="modal-comprar">
    <div class="modal-content">
      <h2>comprar tokens kbt</h2>
      <label for="compra-cantidad">cantidad de kbt</label>
      <input type="number" id="compra-cantidad" placeholder="ej: 10" min="1" step="1">
      <label for="compra-moneda">moneda</label>
      <select id="compra-moneda">
        <option value="pen">soles (s/)</option>
      </select>
      <div class="preview" id="compra-preview">total: s/ 0.00</div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="cerrarModalComprar()">cancelar</button>
        <button class="btn-primary" onclick="ui.ejecutarCompra()">confirmar compra</button>
      </div>
    </div>
  </div>

  <script>
  // ============================================================
  // funcion helper: obtener token de cualquier storage
  // ============================================================
  function obtenerToken() {
    // 1. url query param
    var params = new URLSearchParams(window.location.search);
    var tokenUrl = params.get('token');
    if (tokenUrl) {
      localStorage.setItem('token', tokenUrl);
      // limpiar url
      var nuevaUrl = window.location.pathname + window.location.hash;
      window.history.replaceState({}, '', nuevaUrl);
      return tokenUrl;
    }
    // 2. localStorage
    var t = localStorage.getItem('token');
    if (t) return t;
    // 3. sessionStorage
    t = sessionStorage.getItem('token');
    if (t) {
      // copiar a localStorage para persistencia
      localStorage.setItem('token', t);
      return t;
    }
    return null;
  }

  var panelActual = 'dashboard';
  var cachePaneles = {};

  // clase api
  class Api {
    constructor() {
      this.token = obtenerToken() || '';
      this.base = '';
    }
    async get(path) {
      const r = await fetch(this.base + '/api' + path, {
        headers: { 'Authorization': 'Bearer ' + this.token }
      });
      return r.json();
    }
    async post(path, body) {
      const r = await fetch(this.base + '/api' + path, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      return r.json();
    }
  }

  // clase ui
  class UI {
    constructor() {
      this.api = new Api();
      this._toastTimer = null;
    }

    switchTab(tab) {
      const btn = document.querySelector('.sidebar-link[data-panel="' + tab + '"]');
      if (btn) { cargarPanel(tab, btn); }
    }

    async cargarPanel() {
      try {
        const d = await this.api.get('/dashboard');
        if (!d.exito) return;
        this._actualizarKpis(d);
        this._actualizarFidelidad(d);
        this._actualizarModo(d);
        this._actualizarUsuario(d);
        this._cargarPreciosMarketplace();
      } catch (e) {
        console.error('error cargando panel:', e);
      }
    }

    _actualizarUsuario(d) {
      if (!d.usuario) return;
      document.getElementById('s-user-email').textContent = d.usuario.email || '---';
      document.getElementById('s-user-rol').textContent = d.usuario.rol || '---';
    }

    _actualizarKpis(d) {
      var balance = parseFloat(d.balance || 0);
      var saldoPen = parseFloat(d.saldo_pen || 0);
      var el = document.getElementById('kpi-saldo');
      if (el) el.textContent = balance.toFixed(2);
      el = document.getElementById('kpi-saldo-pen');
      if (el) el.textContent = 's/ ' + saldoPen.toFixed(2);
      el = document.getElementById('kpi-ref-activos');
      if (el) el.textContent = d.referidos_activos || 0;
      el = document.getElementById('kpi-ref-totales');
      if (el) el.textContent = d.referidos_totales || 0;
      el = document.getElementById('kpi-perfiles-activos');
      if (el) el.textContent = d.perfiles_activos || 0;
      el = document.getElementById('kpi-perfiles-totales');
      if (el) el.textContent = d.perfiles_totales || 0;
      var kbtHoy = parseFloat(d.kbt_hoy || 0);
      var kbtTotal = parseFloat(d.kbt_total_minado || 0);
      el = document.getElementById('kpi-kbt-hoy');
      if (el) el.textContent = kbtHoy.toFixed(2);
      el = document.getElementById('kpi-kbt-total');
      if (el) el.textContent = kbtTotal.toFixed(2);
      // badge sidebar
      var bRef = document.getElementById('badge-ref');
      if (bRef) bRef.textContent = d.referidos_activos || 0;
      var bPf = document.getElementById('badge-pf');
      if (bPf) bPf.textContent = d.perfiles_activos || 0;
    }

    async _cargarPreciosMarketplace() {
      try {
        const d = await this.api.get('/precios_marketplace');
        if (d.exito) {
          var el = document.getElementById('kpi-precio-max');
          if (el) el.textContent = 's/ ' + (d.precio_max_venta || 0).toFixed(2);
          el = document.getElementById('kpi-precio-min');
          if (el) el.textContent = 's/ ' + (d.precio_min_compra || 0).toFixed(2);
        }
      } catch (e) { console.error('error cargando precios marketplace:', e); }
    }

    _actualizarFidelidad(d) {
      var nivel = d.usuario && d.usuario.nivel_fiabilidad ? d.usuario.nivel_fiabilidad.toString().toLowerCase() : 'bronce';
      var niveles = {
        'bronce': { pct: 25, texto: 'conecta mas dispositivos para subir de nivel', color: '#cd7f32' },
        'plata': { pct: 50, texto: 'vas por buen camino. sigue asi para alcanzar oro', color: '#c0c0c0' },
        'oro': { pct: 75, texto: 'excelente nivel. casi llegas a diamante', color: '#ffd700' },
        'diamante': { pct: 100, texto: 'nivel maximo alcanzado. eres un maestro granjero', color: '#b9f2ff' },
      };
      var cfg = niveles[nivel] || niveles['bronce'];
      var el = document.getElementById('fidelidad-nivel');
      if (el) el.textContent = nivel.charAt(0).toUpperCase() + nivel.slice(1);
      el = document.getElementById('fidelidad-barra');
      if (el) el.style.width = cfg.pct + '%';
      el = document.getElementById('fidelidad-texto');
      if (el) el.textContent = cfg.texto;
    }

    _actualizarModo(d) {
      var modo = d.modo_actual || 'conectado';
      var esActivo = modo === 'pidiendo_ordenes' || modo === 'conectado';
      var dot = document.getElementById('modo-dot');
      var text = document.getElementById('modo-text');
      if (dot) dot.className = 'modo-dot' + (esActivo ? ' activo' : ' inactivo');
      if (text) {
        text.textContent = esActivo ? 'pidiendo ordenes' : 'uso personal';
        text.style.color = esActivo ? '#22c55e' : '#ef4444';
      }
    }

    async toggleModo() {
      try {
        const r = await this.api.post('/modo/toggle', { modo: '' });
        if (r.exito !== false) {
          this._showSuccess('modo cambiado a: ' + (r.modo_nuevo || ''));
          this.cargarPanel();
        } else {
          this._showError(r.mensaje || 'error al cambiar modo');
        }
      } catch (e) {
        this._showError('error: ' + e.message);
      }
    }

    abrirModalComprar() {
      var modal = document.getElementById('modal-comprar');
      if (modal) {
        modal.classList.add('show');
        var input = document.getElementById('compra-cantidad');
        if (input) input.focus();
      }
    }

    cerrarModalComprar() {
      var modal = document.getElementById('modal-comprar');
      if (modal) modal.classList.remove('show');
    }

    async ejecutarCompra() {
      var cantidad = parseFloat(document.getElementById('compra-cantidad').value);
      var moneda = document.getElementById('compra-moneda').value;
      if (!cantidad || cantidad <= 0) { this._showError('ingresa una cantidad valida'); return; }
      var btn = document.querySelector('#modal-comprar .btn-primary');
      if (!btn) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> procesando...';
      try {
        const r = await this.api.post('/kbt/comprar', { cantidad_kbt: cantidad, moneda: moneda });
        if (r.exito !== false) {
          this._showSuccess('compra exitosa: ' + cantidad + ' kbt por s/ ' + r.costo_fiat);
          this.cerrarModalComprar();
          var input = document.getElementById('compra-cantidad');
          if (input) input.value = '';
          this.cargarPanel();
        } else {
          this._showError(r.detail || r.mensaje || 'error en la compra');
        }
      } catch (e) {
        this._showError('error: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'confirmar compra';
      }
    }

    _showSuccess(msg) { this._toast(msg, 'success'); }
    _showError(msg) { this._toast(msg, 'error'); }
    _toast(msg, type) {
      var container = document.getElementById('toast-container');
      if (!container) return;
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      container.appendChild(t);
      if (this._toastTimer) clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(function() {
        while (container.firstChild) container.removeChild(container.firstChild);
      }, 4000);
    }
  }

  // rutas de paneles
  var rutasPaneles = {
    dashboard: '/publico/panel_dashboard.html',
    wallet: '/publico/wallet.html',

    referidos: '/publico/referidos.html',

  // extraer contenido del panel (fragmento o body)
  function extraerContenido(html, panel) {
    // extraer estilos del head
    var estilos = '';
    var styleMatch = html.match(/<style>([\s\S]*?)<\/style>/i);
    if (styleMatch) {
      estilos = '<style>' + styleMatch[1] + '</style>';
    }
    // buscar body
    var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    if (bodyMatch) {
      var bodyContent = bodyMatch[1];
      // remover scripts, toasts, comentarios
      bodyContent = bodyContent.replace(/<script[\s\S]*?<\/script>/gi, '');
      bodyContent = bodyContent.replace(/<div\s+id="toast-container"[\s\S]*?<\/div>/gi, '');
      bodyContent = bodyContent.replace(/<div\s+class="spinner-container"[\s\S]*?<\/div>/gi, '');
      bodyContent = bodyContent.replace(/<!--[\s\S]*?-->/g, '');
      bodyContent = bodyContent.trim();
      return '<div class="panel-subcontenido" data-panel="' + panel + '">' + estilos + bodyContent + '</div>';
    }
    // fragmento sin body
    var frag = html;
    frag = frag.replace(/<script[\s\S]*?<\/script>/gi, '');
    frag = frag.replace(/<div\s+id="toast-container"[\s\S]*?<\/div>/gi, '');
    frag = frag.replace(/<!--[\s\S]*?-->/g, '');
    frag = frag.trim();
    return '<div class="panel-subcontenido" data-panel="' + panel + '">' + estilos + frag + '</div>';
  }

  function extraerScripts(html, panel) {
    var scripts = [];
    var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    if (!bodyMatch) return scripts;
    var bodyContent = bodyMatch[1];
    var scriptRegex = /<script>([\s\S]*?)<\/script>/gi;
    var match;
    while ((match = scriptRegex.exec(bodyContent)) !== null) {
      if (match[1].trim().length > 0) {
        scripts.push(match[1].trim());
      }
    }
    // cargar dashboard.js si esta referenciado
    var srcRegex = /<script\s+src="([^"]+)"[\s\S]*?<\/script>/gi;
    while ((match = srcRegex.exec(bodyContent)) !== null) {
      var src = match[1];
      if (src.indexOf('dashboard.js') !== -1 && !document.querySelector('script[src*="dashboard.js"]')) {
        scripts.push('// script src: ' + src + ' (omitido, ya definido en spa)');
      }
    }
    return scripts;
  }

  function ejecutarScripts(scripts, panel) {
    scripts.forEach(function(code) {
      if (code.indexOf('// script src:') === 0) return;
      try {
        var codigoMod = code.replace(
          /document\.addEventListener\(['"]DOMContentLoaded['"],\s*(function\s*\(\))/g,
          '$1'
        );
        codigoMod = codigoMod.replace(
          /document\.addEventListener\(['"]DOMContentLoaded['"],\s*async\s*(function\s*\(\))/g,
          'async $1'
        );
        codigoMod = codigoMod.replace(
          /window\.addEventListener\(['"](load|DOMContentLoaded)['"],/g,
          '// '
        );
        var fn = new Function('panel', codigoMod);
        fn(panel);
      } catch (e) {
        console.error('error ejecutando script para panel ' + panel + ':', e);
      }
    });
  }

  async function cargarPanel(panel, btn) {
    if (!panel) return;
    marcarActivo(btn);
    panelActual = panel;
    // actualizar url con pushstate
    if (window.history.pushState) {
      var base = window.location.pathname;
      window.history.pushState({ panel: panel }, '', base + '?tab=' + panel);
    }

    // mostrar loading
    var container = document.getElementById('panel-container');
    container.innerHTML = '<div class="spinner-container"><div class="spinner-ring"></div><div class="spinner-text">cargando ' + panel + '...</div></div>';

    var url = rutasPaneles[panel];
    if (!url) { container.innerHTML = '<div style="padding:2rem;color:#ff3366;text-align:center">panel no encontrado</div>'; return; }

    try {
      var html;
      if (cachePaneles[panel]) {
        html = cachePaneles[panel];
      } else {
        var resp = await fetch(url);
        html = await resp.text();
        cachePaneles[panel] = html;
      }

      var contenido = extraerContenido(html, panel);
      var scripts = extraerScripts(html, panel);

      container.innerHTML = contenido;

      // re-ejecutar scripts del panel cargado
      if (scripts.length > 0) {
        setTimeout(function() {
          ejecutarScripts(scripts, panel);
        }, 50);
      }

      // cerrar sidebar en mobile
      var sidebar = document.getElementById('sidebar');
      var overlay = document.getElementById('sidebar-overlay');
      if (sidebar.classList.contains('mobile-open')) {
        sidebar.classList.remove('mobile-open');
        overlay.classList.remove('show');
      }

      // actualizar datos del dashboard si es necesario
      if (panel === 'dashboard') {
        ui.cargarPanel();
      }
    } catch (e) {
      console.error('error cargando panel ' + panel + ':', e);
      container.innerHTML = '<div style="padding:2rem;color:#ff3366;text-align:center">error al cargar ' + panel + '</div>';
    }
  }

  // escuchar navegacion atras/adelante
  window.addEventListener('popstate', function(e) {
    var tab = e.state && e.state.panel ? e.state.panel : 'dashboard';
    if (tab !== panelActual) {
      var btn = document.querySelector('.sidebar-link[data-panel="' + tab + '"]');
      cargarPanel(tab, btn);
    }
  });

  (function() {

    var token = obtenerToken();

    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.querySelector('.sidebar-link[data-panel="' + panelInicial + '"]');
      cargarPanel(panelInicial, btn);
    });
