<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pedidos - roxymaster</title>
</head>
<body>

<!-- panel pedidos root -->
<div id="panel-pedidos-root" class="panel-pedidos">
  <div class="panel-header-row">
    <h2><i class="fas fa-shopping-cart"></i> panel de pedidos</h2>
    <div class="live-count" id="live-count">1</div>
  </div>
  <div class="subtitle">gestiona tus pedidos de streameando.</div>

  <div id="pedido-msg" class="pedido-msg"></div>

  <div class="pedido-grid">
    <div id="pedidos-formulario-container"></div>
    <div id="pedidos-tabla-container"></div>
  </div>

  <div class="pedido-loading" style="text-align:center;padding:2rem;color:#64748b;font-size:0.85rem">
    <div class="spinner-mini" style="margin:0 auto 0.5rem"></div>
    cargando panel...
  </div>
</div>

<!-- loader que cargara los fragmentos -->
<script>
// ===========================================================================
// pedidos loader - carga fragmentos via fetch y llama inicializacion
// ===========================================================================
(function(){
  "use strict";
  var baseUrl = '/publico/';

  // cargar css de pedidos si no existe
  var cssLink = document.querySelector('link[href*="pedidos.css"]');
  if (!cssLink) {
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = baseUrl + 'css/pedidos.css';
    document.head.appendChild(link);
  }

  // cargar html de un fragmento en un contenedor
  function loadHTML(url, containerId) {
    return fetch(baseUrl + url)
      .then(function(r) {
        if (!r.ok) throw new Error('http ' + r.status + ' ' + url);
        return r.text();
      })
      .then(function(html) {
        var el = document.getElementById(containerId);
        if (el) el.innerHTML = html;
      });
  }

  // cargar y ejecutar codigo js desde pedidos_js.html
  function loadJS() {
    return fetch(baseUrl + 'pedidos_js.html')
      .then(function(r) {
        if (!r.ok) throw new Error('http ' + r.status + ' pedidos_js.html');
        return r.text();
      })
      .then(function(jsHtml) {
        // extraer el script
        var re = /<script>([\s\S]*?)<\/script>/;
        var m = re.exec(jsHtml);
        if (m && m[1]) {
          var fn = new Function(m[1]);
          fn();
        }
      });
  }

  // cargar fragmentos
  Promise.all([
    loadHTML('pedidos_formulario.html', 'pedidos-formulario-container'),
    loadHTML('pedidos_tabla.html', 'pedidos-tabla-container'),
  ])
  .then(function() {
    // remover loading
    var root = document.getElementById('panel-pedidos-root');
    var loading = root && root.querySelector('.pedido-loading');
    if (loading) loading.style.display = 'none';
    return loadJS();
  })
  .then(function() {
    // dashboard llamara inicializarPanelPedidos despues de 150ms
    // no lo llamamos aqui para evitar doble inicializacion
  })
  .catch(function(err) {
    console.error('error cargando pedidos:', err);
    var root = document.getElementById('panel-pedidos-root');
    if (root) {
      root.innerHTML = '<div class="pedido-msg error" style="display:block">error: ' + err.message + '</div>';
    }
  });

})();
</script>
</body>
</html>
