<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>

  if (window.top === window.self) {

})();

<title>pedidos - roxymaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh}
.panel-pedidos{padding:1.5rem;max-width:1280px;margin:0 auto}
.panel-header-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.35rem}
.panel-pedidos h2{font-size:1.6rem;font-weight:800;color:#e2e8f0;display:flex;align-items:center;gap:.5rem;margin:0;letter-spacing:-.02em}
.panel-pedidos h2 i{color:#f0b90b}
.live-count{display:inline-flex;align-items:center;justify-content:center;min-width:1.2rem;padding:.15rem .5rem;border-radius:9999px;font-size:.7rem;font-weight:800;color:#0a0a1a;background:linear-gradient(135deg,#f0b90b,#d4a017);box-shadow:0 0 8px rgba(240,185,11,.4),0 0 16px rgba(240,185,11,.2);position:relative;letter-spacing:.02em;line-height:1.2;animation:live-pulse 2s ease-in-out infinite;border:1px solid rgba(255,215,0,.3)}
@keyframes live-pulse{0%{box-shadow:0 0 8px rgba(240,185,11,.4),0 0 16px rgba(240,185,11,.2)}50%{box-shadow:0 0 12px rgba(240,185,11,.6),0 0 24px rgba(240,185,11,.3),0 0 36px rgba(240,185,11,.1)}100%{box-shadow:0 0 8px rgba(240,185,11,.4),0 0 16px rgba(240,185,11,.2)}}
.live-count::before{content:'';width:6px;height:6px;border-radius:50%;background:#0a0a1a;margin-right:4px;animation:live-dot-pulse 1.5s ease-in-out infinite;display:inline-block}
@keyframes live-dot-pulse{0%,100%{opacity:1}50%{opacity:.4}}
.subtitle{color:#64748b;font-size:.85rem;margin-bottom:1.5rem}

/* formulario */
.pedido-grid{display:flex;flex-direction:column;gap:1.5rem}
.card-pedido{background:linear-gradient(135deg,#1a1a2e 0%,#0f0f23 100%);border-radius:16px;border:1px solid #2a2a4a;padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,.3);position:relative;overflow:hidden}
.card-pedido::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#f0b90b,#d4a017,#f0b90b);opacity:.6}
.card-titulo{font-size:1.125rem;font-weight:700;color:#e2e8f0;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
.card-titulo i{color:#f0b90b}
.field-row{display:flex;gap:.75rem;flex-wrap:wrap}
.field-row .pedido-field{flex:1;min-width:150px}
.pedido-field{margin-bottom:.75rem}
.pedido-field label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:.25rem;font-weight:700}
.pedido-field input,.pedido-field select{width:100%;padding:.55rem .75rem;background:#0d0d22;border:1px solid #2a2a4a;border-radius:10px;color:#e2e8f0;font-size:.85rem;outline:none;transition:border-color .2s,box-shadow .2s;box-sizing:border-box}
.pedido-field input:focus,.pedido-field select:focus{border-color:#f0b90b;box-shadow:0 0 0 3px rgba(240,185,11,.12)}
.pedido-field .field-hint{font-size:.62rem;color:#475569;margin-top:.15rem}
.tiempo-opt-group{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.25rem}
.btn-opt-tiempo{padding:.25rem .55rem;font-size:.68rem;border:1px solid #2a2a4a;background:transparent;color:#94a3b8;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-opt-tiempo:hover{border-color:#f0b90b;color:#e2e8f0;background:rgba(240,185,11,.05)}
.btn-opt-tiempo.active{background:rgba(240,185,11,.15);border-color:#f0b90b;color:#f0b90b;box-shadow:0 0 8px rgba(240,185,11,.15)}
.toggle-group{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid #2a2a4a;width:fit-content}
.toggle-btn{padding:.4rem 1rem;font-size:.75rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:inherit;background:transparent;color:#64748b}
.toggle-btn.active-normal{background:rgba(167,139,250,.2);color:#a78bfa}
.toggle-btn.active-vip{background:rgba(240,185,11,.2);color:#f0b90b}
.costo-visor{background:linear-gradient(135deg,#0d0d22,#111133);border-radius:12px;padding:.85rem;margin:.85rem 0;text-align:center;border:1px solid #1e1e3a}
.costo-visor .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:#64748b;margin-bottom:.1rem}
.costo-visor .valor{font-size:1.3rem;font-weight:800;color:#00ff88;line-height:1.3;font-family:'Courier New',monospace}
.costo-visor .valor.vip{color:#f0b90b;text-shadow:0 0 10px rgba(240,185,11,.3)}
.costo-visor .valor .small{font-size:.75rem;font-weight:600;color:#64748b}
.costo-visor .detalle-linea{font-size:.68rem;color:#475569;margin-top:.15rem;min-height:.9rem}
.costo-visor .detalle-linea.vip{color:#f0b90b}
.btn-crear-wrapper{display:flex;justify-content:center;margin-top:.5rem}
.btn-crear{width:100%;max-width:320px;padding:.8rem;background:linear-gradient(135deg,#f0b90b,#d4a017);border:none;border-radius:12px;color:#0a0a1a;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;font-family:inherit;position:relative;text-transform:uppercase;letter-spacing:.03em}
.btn-crear:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 24px rgba(240,185,11,.4),0 0 40px rgba(240,185,11,.15)}
.btn-crear:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-crear .btn-tooltip{position:absolute;bottom:-1.6rem;font-size:.58rem;color:#475569;font-weight:400;white-space:nowrap;text-transform:none;letter-spacing:0}
.card-tabla{grid-column:1/-1}

/* header de la lista */
.tabla-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.tabla-header .tabla-info{font-size:.78rem;color:#64748b}
.tabla-header .tabla-info i{margin-right:.3rem}
.tabla-header-right{display:flex;gap:.5rem;align-items:center}
.btn-actualizar{padding:.4rem .9rem;background:rgba(240,185,11,.08);border:1px solid rgba(240,185,11,.2);border-radius:8px;color:#f0b90b;font-size:.72rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.375rem;font-family:inherit;font-weight:600}
.btn-actualizar:hover{background:rgba(240,185,11,.18);border-color:#f0b90b;box-shadow:0 0 12px rgba(240,185,11,.1)}
.pedido-msg{padding:.7rem 1rem;border-radius:10px;margin-bottom:1rem;font-size:.8rem;display:none;font-weight:500}
.pedido-msg.success{display:block;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.18);color:#22c55e}
.pedido-msg.error{display:block;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);color:#ef4444}
.pedido-msg.info{display:block;background:rgba(240,185,11,.08);border:1px solid rgba(240,185,11,.18);color:#f0b90b}

/* filtros */
.filtros-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filtro-btn{padding:.3rem .65rem;font-size:.65rem;border:1px solid #2a2a4a;background:transparent;color:#64748b;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:600}
.filtro-btn:hover{border-color:#f0b90b;color:#e2e8f0}
.filtro-btn.active{background:rgba(240,185,11,.12);border-color:#f0b90b;color:#f0b90b}

/* --- cards horizontales --- */
.lista-pedidos-horizontal{display:flex;flex-direction:column;gap:.5rem}
.pedido-card-h{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#0d0d22;border:1px solid rgba(240,185,11,.08);border-radius:10px;transition:all .2s;min-height:48px}
.pedido-card-h:hover{border-color:rgba(240,185,11,.2);background:rgba(240,185,11,.02)}
.pedido-card-h .pcampo{font-size:.72rem;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pedido-card-h .pcampo .plabel{font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;display:block;margin-bottom:1px}
.pedido-card-h .pcampo .pvalor{font-weight:600;color:#e2e8f0}
.pedido-card-h .pid{min-width:40px;font-weight:800;font-size:.85rem;color:#f0b90b}
.pedido-card-h .purll{flex:2;min-width:0}
.pedido-card-h .purll .pvalor{font-size:.68rem;color:#94a3b8}
.pedido-card-h .pperfiles{min-width:40px;text-align:center}
.pedido-card-h .pduracion{min-width:55px;text-align:center}
.pedido-card-h .pcosto{min-width:70px;text-align:right}
.pedido-card-h .pcosto .pvalor{font-family:'Courier New',monospace;color:#00ff88}
.pedido-card-h .pestado{min-width:80px;text-align:center}
.pedido-card-h .pfecha{min-width:70px;text-align:center}
.pedido-card-h .pfecha .pvalor{font-size:.62rem;color:#64748b}
.pedido-card-h .pacciones{display:flex;gap:.3rem;align-items:center;min-width:70px;justify-content:flex-end}

/* badge estados */
.pbadge{display:inline-block;padding:.12rem .45rem;border-radius:9999px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.pbadge.pendiente{background:rgba(240,185,11,.12);color:#f0b90b;border:1px solid rgba(240,185,11,.2)}
.pbadge.en_progreso,.pbadge.trabajando,.pbadge.en-progreso{background:rgba(0,240,255,.1);color:#00f0ff;border:1px solid rgba(0,240,255,.18)}
.pbadge.completado{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.18)}
.pbadge.cancelado,.pbadge.detenido{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.15)}
.pbadge.programado{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.pbadge.fallido{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.18)}

/* botones de accion en cards */
.btn-accion{padding:.25rem .5rem;font-size:.58rem;border-radius:6px;cursor:pointer;transition:all .25s;font-family:inherit;font-weight:700;display:inline-flex;align-items:center;gap:.2rem;border:1.5px solid transparent}
.btn-accion i{font-size:.6rem}
.btn-eliminar{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#ef4444}
.btn-eliminar:hover{background:rgba(239,68,68,.18);border-color:#ef4444}
.btn-detener{background:rgba(240,185,11,.08);border-color:rgba(240,185,11,.25);color:#f0b90b}
.btn-detener:hover{background:rgba(240,185,11,.18);border-color:#f0b90b}
.btn-reabrir{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:#22c55e}
.btn-reabrir:hover{background:rgba(34,197,94,.18);border-color:#22c55e}
.btn-cancelar{background:rgba(100,116,139,.08);border-color:rgba(100,116,139,.25);color:#94a3b8}
.btn-cancelar:hover{background:rgba(100,116,139,.18);border-color:#94a3b8}

/* badge tipo */
.pbadge-tipo{display:inline-block;padding:.08rem .3rem;border-radius:4px;font-size:.5rem;font-weight:700;text-transform:uppercase}
.pbadge-tipo.vip{background:rgba(240,185,11,.12);color:#f0b90b}
.pbadge-tipo.normal{background:rgba(100,116,139,.12);color:#94a3b8}

/* spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(240,185,11,.2);border-top-color:#f0b90b;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* empty state */
.lista-empty{text-align:center;padding:1.5rem;color:#475569;font-size:.78rem}
.lista-empty i{display:block;font-size:1.5rem;margin-bottom:.35rem;color:#2a2a4a}

/* mobile: cards apilados vertical */
@media(max-width:640px){
  .pedido-card-h{flex-wrap:wrap;gap:.35rem;padding:.5rem .65rem}
  .pedido-card-h .pid{min-width:30px}
  .pedido-card-h .purll{flex:1 1 100%;order:10}
  .pedido-card-h .purll .pvalor{white-space:normal;word-break:break-all}
  .pedido-card-h .pacciones{flex:1 1 100%;order:20;justify-content:center;margin-top:.2rem}
  .field-row .pedido-field{min-width:100%}
}

/* programacion horaria */
.programacion-row{border-top:1px solid rgba(240,185,11,.08);padding-top:.75rem;margin-top:.25rem}
.programacion-toggle{font-size:.72rem;color:#94a3b8;cursor:pointer;display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .5rem;border-radius:6px;transition:all .2s;user-select:none}
.programacion-toggle:hover{color:#e2e8f0;background:rgba(240,185,11,.05)}
.programacion-toggle i{font-size:.65rem;color:#f0b90b}
.programacion-fields{display:none;margin-top:.6rem}
.programacion-fields.visible{display:flex;gap:.75rem;flex-wrap:wrap}
.programacion-fields .pedido-field{flex:1;min-width:160px}
</style>
</head>
<body>

<div class="panel-pedidos" id="panel-pedidos-root">
  <div class="panel-header-row">
    <h2><i class="fas fa-shopping-cart"></i> panel de pedidos</h2>
    <div class="live-count" id="live-count">1</div>
  </div>
  <div class="subtitle">gestiona tus pedidos de streameando.</div>

  <div id="pedido-msg" class="pedido-msg"></div>

  <div class="pedido-grid">
    <!-- formulario de nuevo pedido -->
    <div class="card-pedido" id="card-formulario">
      <div class="card-titulo">
        <i class="fas fa-pen-fancy"></i> nuevo pedido
      </div>
      <div class="field-row">
        <div class="pedido-field">
          <label for="ped-url">url del directo</label>
          <input type="text" id="ped-url" placeholder="https://twitch.tv/usuario" autocomplete="off">
        </div>
        <div class="pedido-field">
          <label for="ped-seguidores">seguidores</label>
          <input type="number" id="ped-seguidores" placeholder="ej: 1000" min="1" value="100" autocomplete="off">
        </div>
      </div>
      <div class="field-row">
        <div class="pedido-field">
          <label for="ped-perfiles">perfiles</label>
          <input type="number" id="ped-perfiles" placeholder="10" min="1" max="1000" value="10" autocomplete="off">
          <div class="field-hint">min 1, max 1000</div>
        </div>
        <div class="pedido-field">
          <label for="ped-minutos">tiempo (min)</label>
          <input type="number" id="ped-minutos" placeholder="15" min="1" value="15" autocomplete="off">
        </div>
      </div>
      <div class="pedido-field">
        <label>tiempo rapido</label>
        <div class="tiempo-opt-group">
          <button type="button" class="btn-opt-tiempo active" data-minutos="15" onclick="window.setTiempo(15)">15 min</button>
          <button type="button" class="btn-opt-tiempo" data-minutos="30" onclick="window.setTiempo(30)">30 min</button>
          <button type="button" class="btn-opt-tiempo" data-minutos="60" onclick="window.setTiempo(60)">1 hora</button>
          <button type="button" class="btn-opt-tiempo" data-minutos="120" onclick="window.setTiempo(120)">2 horas</button>
          <button type="button" class="btn-opt-tiempo" data-minutos="240" onclick="window.setTiempo(240)">4 horas</button>
          <button type="button" class="btn-opt-tiempo" data-minutos="480" onclick="window.setTiempo(480)">8 horas</button>
        </div>
      </div>
      <div class="pedido-field">
        <label for="ped-comentarios">nivel de comentarios</label>
        <select id="ped-comentarios">
          <option value="basico">basico</option>
          <option value="normal" selected>normal</option>
          <option value="intenso">intenso</option>
        </select>
      </div>
      <div class="pedido-field">
        <label>tipo de pedido</label>
        <div class="toggle-group">
          <button type="button" class="toggle-btn active-normal" data-tipo="normal" onclick="window.setTipo('normal')">normal</button>
          <button type="button" class="toggle-btn" data-tipo="vip" onclick="window.setTipo('vip')">vip</button>
        </div>
      </div>
      <!-- programacion horaria -->
      <div class="programacion-row">
        <div class="programacion-toggle" onclick="window.toggleProgramacion()">
          <i class="fas fa-calendar-alt"></i> programar para despues
        </div>
        <div class="programacion-fields" id="programacion-fields">
          <div class="pedido-field">
            <label for="ped-hora-inicio">inicio programado</label>
            <input type="datetime-local" id="ped-hora-inicio">
            <div class="field-hint">deja en blanco para ejecutar ahora</div>
          </div>
          <div class="pedido-field">
            <label for="ped-hora-fin">fin programado</label>
            <input type="datetime-local" id="ped-hora-fin">
            <div class="field-hint">requiere inicio. si se omite, se usara la duracion</div>
          </div>
        </div>
      </div>
      <div class="costo-visor">
        <div class="label">costo estimado</div>
        <div class="valor" id="costo-valor">0.0000 <span class="small">kbt</span></div>
        <div class="detalle-linea" id="costo-detalle-linea">ingresa datos para calcular costo</div>
      </div>
      <div class="btn-crear-wrapper">
        <button class="btn-crear" id="btn-crear-pedido" onclick="window.crearPedido()">
          <i class="fas fa-paper-plane"></i> crear pedido
          <span class="btn-tooltip">los pedidos se procesan segun disponibilidad de pcbots</span>
        </button>
      </div>
    </div>

    <!-- lista horizontal de pedidos debajo del formulario -->
    <div class="card-pedido card-tabla">
      <div class="card-titulo">
        <i class="fas fa-history"></i> historial de pedidos
        <span style="font-size:.7rem;color:#64748b;font-weight:400;margin-left:.3rem" id="total-pedidos-label"></span>
      </div>
      <div class="tabla-header">
        <div class="filtros-bar" id="filtros-bar">
          <button class="filtro-btn active" data-filtro="todos" onclick="window.aplicarFiltro('todos')">todos</button>
          <button class="filtro-btn" data-filtro="pendiente" onclick="window.aplicarFiltro('pendiente')">en espera</button>
          <button class="filtro-btn" data-filtro="en_progreso" onclick="window.aplicarFiltro('en_progreso')">en progreso</button>
          <button class="filtro-btn" data-filtro="completado" onclick="window.aplicarFiltro('completado')">completados</button>
          <button class="filtro-btn" data-filtro="programado" onclick="window.aplicarFiltro('programado')">programados</button>
          <button class="filtro-btn" data-filtro="cancelado" onclick="window.aplicarFiltro('cancelado')">cancelados</button>
        </div>
        <div class="tabla-header-right">
          <button class="btn-actualizar" onclick="window.cargarPedidos()">
            <i class="fas fa-sync-alt"></i> actualizar
          </button>
        </div>
      </div>
      <div id="lista-pedidos-horizontal" class="lista-pedidos-horizontal">
        <div class="lista-empty"><i class="fas fa-spinner fa-pulse"></i>cargando pedidos...</div>
      </div>
    </div>
  </div>
</div>

<script>
// helpers
function $(id) { return document.getElementById(id); }
function valor(id) { var el = $(id); return el ? el.value : ''; }

// --- estado interno ---
var _ped_estado = {
  tipo: 'normal',
  filtro: 'todos',
  todosPedidos: [],
  intervalId: null,
  programacionVisible: false,
};

window.mostrarMensaje = function(texto, tipo) {
  var msg = $('pedido-msg');
  if (!msg) return;
  msg.textContent = texto || '';
  msg.className = 'pedido-msg' + (tipo ? ' ' + tipo : '');
  if (texto) {
    msg.style.display = 'block';
    setTimeout(function() {
      msg.style.display = 'none';
      msg.className = 'pedido-msg';
    }, 7000);
  } else {
    msg.style.display = 'none';
    msg.className = 'pedido-msg';
  }
};

window.toggleProgramacion = function() {
  _ped_estado.programacionVisible = !_ped_estado.programacionVisible;
  var el = $('programacion-fields');
  if (el) el.classList.toggle('visible', _ped_estado.programacionVisible);
};

window.obtenerToken = function() {
  return (window.obtenerTokenGlobal && window.obtenerTokenGlobal()) ||
    localStorage.getItem('token') ||
    sessionStorage.getItem('token') ||
    (function() {
      var m = window.location.search.match(/[?&]token=([^&]+)/);
      return m ? decodeURIComponent(m[1]) : null;
    })();
};

window.getHeaders = function() {
  var token = window.obtenerToken();
  var h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
};

window.setTiempo = function(minutos) {
  var input = $('ped-minutos');
  if (input) input.value = minutos;
  document.querySelectorAll('.btn-opt-tiempo').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.getAttribute('data-minutos')) === minutos);
  });
  window.calcularCosto();
};

window.setTipo = function(tipo) {
  _ped_estado.tipo = tipo;
  document.querySelectorAll('.toggle-btn').forEach(function(b) {
    b.classList.remove('active-normal', 'active-vip');
    if (b.getAttribute('data-tipo') === tipo) {
      b.classList.add(tipo === 'vip' ? 'active-vip' : 'active-normal');
    }
  });
  window.calcularCosto();
};

window.calcularCosto = function() {
  var seguidores = parseInt(valor('ped-seguidores')) || 0;
  var perfiles = parseInt(valor('ped-perfiles')) || 0;
  var horas = (parseInt(valor('ped-minutos')) || 0) / 60;
  var nivel = valor('ped-comentarios') || 'basico';
  var costoEl = $('costo-valor');
  var detalleEl = $('costo-detalle-linea');
  if (!costoEl || !detalleEl) return;

  if (seguidores <= 0 || perfiles <= 0 || horas <= 0) {
    costoEl.innerHTML = '0.0000 <span class="small">kbt</span>';
    detalleEl.textContent = 'ingresa datos para calcular costo';
    return;
  }

  var tasaBase = 0.0001;
  var multNivel = { basico: 1, normal: 1.5, intenso: 2.5 };
  var multVip = _ped_estado.tipo === 'vip' ? 2.0 : 1.0;
  var costo = seguidores * perfiles * horas * tasaBase * (multNivel[nivel] || 1) * multVip;
  var costoStr = costo.toFixed(4);

  costoEl.innerHTML = (_ped_estado.tipo === 'vip' ? 'vip ' : '') + costoStr + ' <span class="small">kbt</span>';
  costoEl.className = 'valor' + (_ped_estado.tipo === 'vip' ? ' vip' : '');
  detalleEl.textContent = seguidores + ' seguidores x ' + perfiles + ' perfiles x ' + horas.toFixed(1) + 'h';
  if (_ped_estado.tipo === 'vip') detalleEl.className = 'detalle-linea vip';
  else detalleEl.className = 'detalle-linea';
};

window.crearPedido = function() {
  var url = valor('ped-url');
  if (!url) { window.mostrarMensaje('ingresa la url del directo', 'error'); return; }
  var seguidores = parseInt(valor('ped-seguidores')) || 0;
  if (seguidores <= 0) { window.mostrarMensaje('ingresa una cantidad valida de seguidores', 'error'); return; }
  var perfiles = parseInt(valor('ped-perfiles')) || 0;
  if (perfiles <= 0) { window.mostrarMensaje('ingresa una cantidad valida de perfiles', 'error'); return; }
  var minutos = parseInt(valor('ped-minutos')) || 0;
  if (minutos <= 0) { window.mostrarMensaje('ingresa un tiempo valido', 'error'); return; }
  var nivel = valor('ped-comentarios') || 'basico';
  var btn = $('btn-crear-pedido');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> creando...'; }

  // programacion
  var horaInicio = $('ped-hora-inicio') ? valor('ped-hora-inicio') : '';
  var horaFin = $('ped-hora-fin') ? valor('ped-hora-fin') : '';
  // convertir datetime-local (local) a iso utc
  if (horaInicio) {
    var d = new Date(horaInicio);
    if (!isNaN(d.getTime())) horaInicio = d.toISOString();
  }
  if (horaFin) {
    var d = new Date(horaFin);
    if (!isNaN(d.getTime())) horaFin = d.toISOString();
  }

  var data = {
    url: url,
    seguidores: seguidores,
    perfiles: perfiles,
    minutos: minutos,
    nivel_comentarios: nivel,
    tipo: _ped_estado.tipo,
  };
  if (horaInicio) data.hora_inicio = horaInicio;
  if (horaFin) data.hora_fin = horaFin;

  fetch('/api/pedidos/crear', {
    method: 'POST',
    headers: window.getHeaders(),
    body: JSON.stringify(data),
  })
  .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
  .then(function(resp) {
    if (resp.status >= 200 && resp.status < 300) {
      window.mostrarMensaje(resp.json.detail || resp.json.mensaje || 'pedido creado exitosamente', 'success');
      window.cargarPedidos();
      window.calcularCosto();
    } else {
      window.mostrarMensaje(resp.json.detail || 'error al crear pedido', 'error');
    }
  })
  .catch(function(err) {
    window.mostrarMensaje('error de conexion: ' + err.message, 'error');
  })
  .finally(function() {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> crear pedido<span class="btn-tooltip">los pedidos se procesan segun disponibilidad de pcbots</span>'; }
  });
};

window.aplicarFiltro = function(filtro) {
  _ped_estado.filtro = filtro;
  document.querySelectorAll('.filtro-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-filtro') === filtro);
  });
  window.renderizarCards(_ped_estado.todosPedidos);
};

window.renderizarCards = function(pedidos) {
  var contenedor = $('lista-pedidos-horizontal');
  if (!contenedor) return;

  var filtro = _ped_estado.filtro;
  var filtrados = pedidos;
  if (filtro && filtro !== 'todos') {
    filtrados = pedidos.filter(function(p) {
      return (p.estado || '').toLowerCase() === filtro.toLowerCase();
    });
  }

  var totalLabel = $('total-pedidos-label');
  if (totalLabel) totalLabel.textContent = '(' + filtrados.length + '/' + pedidos.length + ')';

  if (filtrados.length === 0) {
    var msg = 'no hay pedidos' + (filtro !== 'todos' ? ' con filtro "' + filtro + '"' : ' aun. crea tu primer pedido arriba.');
    contenedor.innerHTML = '<div class="lista-empty">' + msg + '</div>';
    return;
  }

  var cards = filtrados.map(function(p) {
    var estadoCls = (p.estado || 'desconocido').toLowerCase().replace(/\s+/g, '_');
    var esPendiente = estadoCls === 'pendiente';
    var esProgreso = estadoCls === 'en_progreso' || estadoCls === 'trabajando' || estadoCls === 'en-progreso';
    var esProgramado = estadoCls === 'programado';
    var esDetenido = estadoCls === 'detenido' || estadoCls === 'cancelado';
    var esFallido = estadoCls === 'fallido';
    var esCompletado = estadoCls === 'completado';
    var esCancelable = esPendiente || esProgreso || esProgramado;

    var accionesHtml = '<div class="pacciones">';
    if (esPendiente) {
      accionesHtml += '<button class="btn-accion btn-eliminar" onclick="window.eliminarPedido(' + p.id + ')" title="eliminar"><i class="fas fa-trash-alt"></i></button>';
    }
    if (esProgreso) {
      accionesHtml += '<button class="btn-accion btn-detener" onclick="window.detenerPedido(' + p.id + ')" title="detener"><i class="fas fa-stop-circle"></i></button>';
    }
    if (esProgramado) {
      accionesHtml += '<button class="btn-accion btn-cancelar" onclick="window.cancelarPedido(' + p.id + ')" title="cancelar programado"><i class="fas fa-ban"></i></button>';
    }
    if (esDetenido || esFallido) {
      accionesHtml += '<button class="btn-accion btn-reabrir" onclick="window.reabrirPedido(' + p.id + ')" title="reintentar"><i class="fas fa-redo-alt"></i></button>';
    }
    if (esCancelable) {
      accionesHtml += '<button class="btn-accion btn-cancelar" onclick="window.cancelarPedido(' + p.id + ')" title="cancelar"><i class="fas fa-ban"></i></button>';
    }
    accionesHtml += '</div>';

    var urlMostrar = p.url || '-';
    var urlCorta = urlMostrar.length > 40 ? urlMostrar.substring(0, 40) + '...' : urlMostrar;
    var fecha = p.fecha_creacion || p.created_at || '-';
    if (fecha && fecha.length > 10) fecha = fecha.substring(0, 10);

    var duracion = p.minutos || p.duracion_horas || '-';
    if (typeof duracion === 'number' && duracion < 100) duracion = duracion + ' min';
    else if (typeof duracion === 'number') duracion = duracion + 'h';

    var costo = p.costo_total || p.costo || 0;
    var costoStr = typeof costo === 'number' ? costo.toFixed(2) : costo;

    var tipoBadge = '<span class="pbadge-tipo ' + ((p.tipo || '').toLowerCase() === 'vip' ? 'vip' : 'normal') + '">' + (p.tipo || 'normal') + '</span>';

    return '<div class="pedido-card-h">' +
      '<div class="pcampo pid">#' + (p.id || '') + '</div>' +
      '<div class="pcampo purll"><span class="plabel">url</span><span class="pvalor" title="' + urlMostrar.replace(/"/g, '"') + '">' + urlCorta + '</span></div>' +
      '<div class="pcampo pperfiles"><span class="plabel">perf</span><span class="pvalor">' + (p.perfiles || '-') + '</span></div>' +
      '<div class="pcampo pduracion"><span class="plabel">dur</span><span class="pvalor">' + duracion + '</span></div>' +
      '<div class="pcampo pcosto"><span class="plabel">costo</span><span class="pvalor">' + costoStr + ' kbt</span></div>' +
      '<div class="pcampo pestado"><span class="plabel">estado</span><span class="pbadge ' + estadoCls + '">' + (p.estado || '?') + '</span></div>' +
      '<div class="pcampo pfecha"><span class="plabel">fecha</span><span class="pvalor">' + fecha + '</span></div>' +
      accionesHtml +
    '</div>';
  });

  contenedor.innerHTML = cards.join('');
};

window.cargarPedidos = function() {
  var contenedor = $('lista-pedidos-horizontal');
  if (!contenedor) return;

  fetch('/api/pedidos/mis_pedidos', { headers: window.getHeaders() })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var pedidos = data.pedidos || [];
    _ped_estado.todosPedidos = pedidos;
    window.renderizarCards(pedidos);
  })
  .catch(function(err) {
    contenedor.innerHTML = '<div class="lista-empty"><i class="fas fa-exclamation-triangle" style="color:#ef4444"></i>error al cargar pedidos: ' + err.message + '</div>';
  });
};

window.eliminarPedido = function(id) {
  if (!confirm('eliminar pedido #' + id + '? se reembolsaran los tokens si esta pendiente.')) return;
  fetch('/api/pedidos/' + id, {
    method: 'DELETE',
    headers: window.getHeaders(),
  })
  .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
  .then(function(resp) {
    if (resp.status >= 200 && resp.status < 300) {
      window.mostrarMensaje(resp.json.mensaje || resp.json.detail || 'pedido #' + id + ' eliminado', 'success');
      window.cargarPedidos();
    } else {
      window.mostrarMensaje(resp.json.detail || 'error al eliminar pedido', 'error');
    }
  })
  .catch(function(err) {
    window.mostrarMensaje('error de conexion: ' + err.message, 'error');
  });
};

window.detenerPedido = function(id) {
  if (!confirm('detener pedido #' + id + '? se reembolsara el 50% del costo.')) return;
  fetch('/api/pedidos/' + id + '/detener', {
    method: 'POST',
    headers: window.getHeaders(),
  })
  .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
  .then(function(resp) {
    if (resp.status >= 200 && resp.status < 300) {
      window.mostrarMensaje(resp.json.mensaje || resp.json.detail || 'pedido #' + id + ' detenido' + (resp.json.reembolso ? '. reembolso: ' + resp.json.reembolso + ' kbt' : ''), 'info');
      window.cargarPedidos();
    } else {
      window.mostrarMensaje(resp.json.detail || 'error al detener pedido', 'error');
    }
  })
  .catch(function(err) {
    window.mostrarMensaje('error de conexion: ' + err.message, 'error');
  });
};

window.reabrirPedido = function(id) {
  if (!confirm('reintentar pedido #' + id + '?')) return;
  fetch('/api/pedidos/' + id + '/reabrir', {
    method: 'POST',
    headers: window.getHeaders(),
  })
  .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
  .then(function(resp) {
    if (resp.status >= 200 && resp.status < 300) {
      window.mostrarMensaje(resp.json.mensaje || resp.json.detail || 'pedido #' + id + ' reabierto', 'success');
      window.cargarPedidos();
    } else {
      window.mostrarMensaje(resp.json.detail || 'error al reabrir pedido', 'error');
    }
  })
  .catch(function(err) {
    window.mostrarMensaje('error de conexion: ' + err.message, 'error');
  });
};

window.cancelarPedido = function(id) {
  if (!confirm('cancelar pedido #' + id + '? no habra devolucion ni reembolso.')) return;
  fetch('/api/pedidos/' + id + '/cancelar', {
    method: 'POST',
    headers: window.getHeaders(),
  })
  .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
  .then(function(resp) {
    if (resp.status >= 200 && resp.status < 300) {
      window.mostrarMensaje(resp.json.mensaje || resp.json.detail || 'pedido #' + id + ' cancelado', 'info');
      window.cargarPedidos();
    } else {
      window.mostrarMensaje(resp.json.detail || 'error al cancelar pedido', 'error');
    }
  })
  .catch(function(err) {
    window.mostrarMensaje('error de conexion: ' + err.message, 'error');
  });
};

function configurarEventos() {
  ['ped-url','ped-seguidores','ped-perfiles','ped-minutos','ped-comentarios'].forEach(function(id) {
    var el = $(id);
    if (el) {
      el.addEventListener('input', window.calcularCosto);
      el.addEventListener('change', window.calcularCosto);
    }
  });
}

function iniciarAutoRecarga() {
  _ped_estado.intervalId = setInterval(function() {
    window.cargarPedidos();
  }, 15000);
}

window.limpiarIntervaloPedidos = function() {
  if (_ped_estado.intervalId) {
    clearInterval(_ped_estado.intervalId);
    _ped_estado.intervalId = null;
  }
};

function iniciarLiveCount() {
  var el = document.getElementById('live-count');
  if (!el) return;
  var count = parseInt(localStorage.getItem('pedidos_live_count') || '1', 10);
  var lastUpdate = parseInt(localStorage.getItem('pedidos_live_count_time') || '0', 10);
  var ahora = Date.now();
  var intervalo = 67 * 60 * 1000;
  if (lastUpdate > 0 && (ahora - lastUpdate) >= intervalo) {
    var intervalosPasados = Math.floor((ahora - lastUpdate) / intervalo);
    for (var i = 0; i < intervalosPasados; i++) {
      count += Math.random() < 0.5 ? 1 : 2;
    }
    localStorage.setItem('pedidos_live_count', String(count));
    localStorage.setItem('pedidos_live_count_time', String(ahora));
  } else if (lastUpdate === 0) {
    localStorage.setItem('pedidos_live_count', String(count));
    localStorage.setItem('pedidos_live_count_time', String(ahora));
  }
  el.textContent = count;
  setInterval(function() {
    var c = parseInt(localStorage.getItem('pedidos_live_count') || '1', 10);
    c += Math.random() < 0.5 ? 1 : 2;
    localStorage.setItem('pedidos_live_count', String(c));
    localStorage.setItem('pedidos_live_count_time', String(Date.now()));
    var e = document.getElementById('live-count');
    if (e) e.textContent = c;
  }, intervalo);
}

window.inicializarPanelPedidos = function() {
  configurarEventos();
  window.calcularCosto();
  window.cargarPedidos();
  window.limpiarIntervaloPedidos();
  iniciarAutoRecarga();
  iniciarLiveCount();
};

// auto-init si no hay dashboard contenedor
document.addEventListener('DOMContentLoaded', function() {
  if (document.getElementById('panel-pedidos-root')) {
    window.inicializarPanelPedidos();
  }
});
</script>
