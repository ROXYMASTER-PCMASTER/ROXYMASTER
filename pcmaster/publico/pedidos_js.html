<script>
/* ============================================================================
   panel pedidos - logica principal
   ============================================================================ */

(function() {
  "use strict";

  // --- estado interno ---
  var estado = {
    tipo: 'normal',
    intervalId: null,
  };

  // --- helpers ---
  function $(id) { return document.getElementById(id); }
  function valor(id) { var el = $(id); return el ? el.value : ''; }

  // --- mensajes ---
  window.mostrarMensaje = function(texto, tipo) {
    var msg = $('pedido-msg');
    if (!msg) return;
    msg.textContent = texto || '';
    msg.className = 'pedido-msg' + (tipo ? ' ' + tipo : '');
    if (texto) {
      msg.style.display = 'block';
      setTimeout(function() {
        msg.style.display = 'none';
        msg.className = 'pedido-msg';
      }, 6000);
    } else {
      msg.style.display = 'none';
      msg.className = 'pedido-msg';
    }
  };

  // --- obtener token ---
  window.obtenerToken = function() {
    return (window.obtenerTokenGlobal && window.obtenerTokenGlobal()) ||
      localStorage.getItem('token') ||
      sessionStorage.getItem('token') ||
      (function() {
        var m = window.location.search.match(/[?&]token=([^&]+)/);
        return m ? decodeURIComponent(m[1]) : null;
      })();
  };

  // --- headers ---
  window.getHeaders = function() {
    var token = window.obtenerToken();
    var h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  };

  // --- set tiempo ---
  window.setTiempo = function(minutos) {
    var input = $('ped-minutos');
    if (input) input.value = minutos;
    document.querySelectorAll('.btn-opt-tiempo').forEach(function(b) {
      b.classList.toggle('active', parseInt(b.getAttribute('data-minutos')) === minutos);
    });
    window.calcularCosto();
  };

  // --- set tipo ---
  window.setTipo = function(tipo) {
    estado.tipo = tipo;
    document.querySelectorAll('.toggle-btn').forEach(function(b) {
      b.classList.remove('active-normal', 'active-vip');
      if (b.getAttribute('data-tipo') === tipo) {
        b.classList.add(tipo === 'vip' ? 'active-vip' : 'active-normal');
      }
    });
    window.calcularCosto();
  };

  // --- calcular costo ---
  window.calcularCosto = function() {
    var seguidores = parseInt(valor('ped-seguidores')) || 0;
    var perfiles = parseInt(valor('ped-perfiles')) || 0;
    var horas = (parseInt(valor('ped-minutos')) || 0) / 60;
    var nivel = valor('ped-comentarios') || 'basico';
    var costoEl = $('costo-valor');
    var detalleEl = $('costo-detalle-linea');
    if (!costoEl || !detalleEl) return;

    if (seguidores <= 0 || perfiles <= 0 || horas <= 0) {
      costoEl.innerHTML = '0.00 <span class="small">kbt</span>';
      detalleEl.textContent = 'ingresa datos para calcular costo';
      return;
    }

    var tasaBase = 0.0001;
    var multNivel = { basico: 1, normal: 1.5, intenso: 2.5 };
    var multVip = estado.tipo === 'vip' ? 2.0 : 1.0;
    var costo = seguidores * perfiles * horas * tasaBase * (multNivel[nivel] || 1) * multVip;
    var costoStr = costo.toFixed(4);

    costoEl.innerHTML = (estado.tipo === 'vip' ? 'vip ' : '') + costoStr + ' <span class="small">kbt</span>';
    costoEl.className = 'valor' + (estado.tipo === 'vip' ? ' vip' : '');
    detalleEl.textContent = seguidores + ' seguidores x ' + perfiles + ' perfiles x ' + horas.toFixed(1) + 'h';
    if (estado.tipo === 'vip') detalleEl.className = 'detalle-linea vip';
    else detalleEl.className = 'detalle-linea';
  };

  // --- convertir datetime-local a iso utc ---
  function convertirAHoraUTC(idCampo) {
    var el = $(idCampo);
    if (!el || !el.value) return '';
    var fechaLocal = new Date(el.value);
    if (isNaN(fechaLocal.getTime())) return '';
    return fechaLocal.toISOString().replace('Z', '+00:00');
  }

  // --- crear pedido ---
  window.crearPedido = function() {
    var url = valor('ped-url');
    if (!url) { window.mostrarMensaje('ingresa la url del directo', 'error'); return; }
    var seguidores = parseInt(valor('ped-seguidores')) || 0;
    if (seguidores <= 0) { window.mostrarMensaje('ingresa una cantidad valida de seguidores', 'error'); return; }
    var perfiles = parseInt(valor('ped-perfiles')) || 0;
    if (perfiles <= 0) { window.mostrarMensaje('ingresa una cantidad valida de perfiles', 'error'); return; }
    var minutos = parseInt(valor('ped-minutos')) || 0;
    if (minutos <= 0) { window.mostrarMensaje('ingresa un tiempo valido', 'error'); return; }
    var nivel = valor('ped-comentarios') || 'basico';
    var btn = $('btn-crear-pedido');
    if (btn) btn.disabled = true;

    // leer campos de agendamiento (opcionales)
    var horaInicio = convertirAHoraUTC('ped-hora-inicio');
    var horaFin = convertirAHoraUTC('ped-hora-fin');

    var data = {
      url: url,
      seguidores: seguidores,
      perfiles: perfiles,
      minutos: minutos,
      nivel_comentarios: nivel,
      tipo: estado.tipo,
    };

    // agregar campos de agendamiento solo si estan presentes
    if (horaInicio) data.hora_inicio = horaInicio;
    if (horaFin) data.hora_fin = horaFin;

    // decidir endpoint segun si hay agendamiento
    var esProgramado = horaInicio !== '';
    var endpoint = esProgramado ? '/api/pedidos/crear_con_agenda' : '/api/pedidos/crear';

    fetch(endpoint, {
      method: 'POST',
      headers: window.getHeaders(),
      body: JSON.stringify(data),
    })
    .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
    .then(function(resp) {
      if (resp.status >= 200 && resp.status < 300) {
        var mensaje = resp.json.mensaje || resp.json.detail || 'pedido creado exitosamente';
        if (resp.json.programado) {
          mensaje += ' (programado)';
        }
        window.mostrarMensaje(mensaje, 'success');
        window.cargarPedidos();
        window.calcularCosto();
      } else {
        window.mostrarMensaje(resp.json.detail || 'error al crear pedido', 'error');
      }
    })
    .catch(function(err) {
      window.mostrarMensaje('error de conexion: ' + err.message, 'error');
    })
    .finally(function() {
      if (btn) btn.disabled = false;
    });
  };

  // --- cargar pedidos (con botones de accion) ---
  window.cargarPedidos = function() {
    var body = $('tabla-pedidos-body');
    if (!body) return;

    fetch('/api/pedidos/mis_pedidos', { headers: window.getHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var pedidos = data.pedidos || [];
      if (pedidos.length === 0) {
        body.innerHTML = '<tr><td colspan="8" class="tabla-empty">no hay pedidos aun. crea tu primer pedido arriba.</td></tr>';
        return;
      }

      var rows = pedidos.map(function(p) {
        var estadoCls = (p.estado || 'desconocido').toLowerCase();
        var esPendiente = estadoCls === 'pendiente';
        var esProgramado = estadoCls === 'programado';
        var esTrabajando = estadoCls === 'trabajando' || estadoCls === 'en progreso';
        var esVip = p.tipo === 'vip';
        var costo = p.costo_total || p.costo || 0;

      var accionesHtml = '<div class="acciones-cell">';
      if (esPendiente || esProgramado || esTrabajando) {
        accionesHtml += '<button class="btn-accion cancelar" onclick="window.cancelarPedido(' + p.id + ')" title="cancelar pedido">cancelar</button>';
      }
      if (esPendiente || esProgramado) {
        accionesHtml += '<button class="btn-accion btn-eliminar" onclick="window.eliminarPedido(' + p.id + ')" title="eliminar pedido"><i class="fas fa-trash-alt"></i></button>';
      }
      if (esTrabajando) {
        accionesHtml += '<button class="btn-accion btn-detener" onclick="window.detenerPedido(' + p.id + ')" title="detener pedido"><i class="fas fa-stop-circle"></i></button>';
      }
      accionesHtml += '</div>';

        var urlMostrar = p.url || '-';
        var urlCorta = urlMostrar.length > 30 ? urlMostrar.substring(0, 30) + '...' : urlMostrar;
        var fecha = p.fecha_creacion || p.created_at || '-';
        if (fecha && fecha.length > 10) fecha = fecha.substring(0, 10);

        var duracion = p.duracion || p.minutos || p.duracion_horas || '-';
        if (typeof duracion === 'number') {
          if (p.hora_inicio_programada) {
            duracion = duracion + 'h (programado)';
          } else {
            duracion = duracion + ' min';
          }
        }

        return '<tr' + (esVip ? ' class="vip-row"' : '') + '>' +
          '<td class="col-id">' + (p.id || '#') + '</td>' +
          '<td><span class="truncate-url" title="' + urlMostrar.replace(/"/g, '"') + '">' + urlCorta + '</span></td>' +
          '<td class="col-perfiles">' + (p.perfiles || '-') + '</td>' +
          '<td class="col-duracion">' + duracion + '</td>' +
          '<td class="col-costo">' + (typeof costo === 'number' ? costo.toFixed(2) : costo) + ' kbt</td>' +
          '<td class="col-estado"><span class="badge-estado ' + estadoCls + '">' + (p.estado || '?') + '</span></td>' +
          '<td class="col-fecha">' + fecha + '</td>' +
          '<td class="col-acciones">' + accionesHtml + '</td>' +
        '</tr>';
      });

      body.innerHTML = rows.join('');
    })
    .catch(function(err) {
      body.innerHTML = '<tr><td colspan="8" class="tabla-empty">error al cargar pedidos: ' + err.message + '</td></tr>';
    });
  };

  // --- eliminar pedido ---
  window.eliminarPedido = function(id) {
    if (!confirm('eliminar pedido #' + id + '?')) return;
    fetch('/api/pedidos/' + id, {
      method: 'DELETE',
      headers: window.getHeaders(),
    })
    .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
    .then(function(resp) {
      if (resp.status >= 200 && resp.status < 300) {
        window.mostrarMensaje('pedido #' + id + ' eliminado', 'success');
        window.cargarPedidos();
      } else {
        window.mostrarMensaje(resp.json.detail || 'error al eliminar pedido', 'error');
      }
    })
    .catch(function(err) {
      window.mostrarMensaje('error de conexion: ' + err.message, 'error');
    });
  };

  // --- cancelar pedido ---
  window.cancelarPedido = function(id) {
    if (!confirm('cancelar pedido #' + id + '?')) return;
    fetch('/api/pedidos/' + id + '/cancelar', {
      method: 'POST',
      headers: window.getHeaders(),
    })
    .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
    .then(function(resp) {
      if (resp.status >= 200 && resp.status < 300) {
        window.mostrarMensaje('pedido #' + id + ' cancelado', 'success');
        window.cargarPedidos();
      } else {
        window.mostrarMensaje(resp.json.detail || 'error al cancelar pedido', 'error');
      }
    })
    .catch(function(err) {
      window.mostrarMensaje('error de conexion: ' + err.message, 'error');
    });
  };

  // --- detener pedido ---
  window.detenerPedido = function(id) {
    if (!confirm('detener pedido #' + id + '?')) return;
    fetch('/api/pedidos/' + id + '/detener', {
      method: 'POST',
      headers: window.getHeaders(),
    })
    .then(function(r) { return r.json().then(function(j) { return { status: r.status, json: j }; }); })
    .then(function(resp) {
      if (resp.status >= 200 && resp.status < 300) {
        window.mostrarMensaje('pedido #' + id + ' detenido', 'info');
        window.cargarPedidos();
      } else {
        window.mostrarMensaje(resp.json.detail || 'error al detener pedido', 'error');
      }
    })
    .catch(function(err) {
      window.mostrarMensaje('error de conexion: ' + err.message, 'error');
    });
  };

  // --- configurar eventos del formulario ---
  function configurarEventos() {
    ['ped-url','ped-seguidores','ped-perfiles','ped-minutos','ped-comentarios'].forEach(function(id) {
      var el = $(id);
      if (el) {
        el.addEventListener('input', window.calcularCosto);
        el.addEventListener('change', window.calcularCosto);
      }
    });
  }

  // --- iniciar auto-recarga ---
  function iniciarAutoRecarga() {
    estado.intervalId = setInterval(function() {
      var body = $('tabla-pedidos-body');
      if (body && body.querySelector('.tabla-empty') === null) {
        window.cargarPedidos();
      }
    }, 15000);
  }

  // --- limpiar intervalo ---
  window.limpiarIntervaloPedidos = function() {
    if (estado.intervalId) {
      clearInterval(estado.intervalId);
      estado.intervalId = null;
    }
  };

  // --- live count: inicia en 1, aumenta 1-2 cada 67 minutos ---
  function iniciarLiveCount() {
    var el = document.getElementById('live-count');
    if (!el) return;
    // recuperar valor guardado o empezar en 1
    var count = parseInt(localStorage.getItem('pedidos_live_count') || '1', 10);
    var lastUpdate = parseInt(localStorage.getItem('pedidos_live_count_time') || '0', 10);
    var ahora = Date.now();
    var intervalo = 67 * 60 * 1000; // 67 minutos en ms
    // si paso mas de 1 intervalo desde la ultima actualizacion, recalcular
    if (lastUpdate > 0 && (ahora - lastUpdate) >= intervalo) {
      var intervalosPasados = Math.floor((ahora - lastUpdate) / intervalo);
      for (var i = 0; i < intervalosPasados; i++) {
        count += Math.random() < 0.5 ? 1 : 2; // 1 o 2 aleatorio
      }
      localStorage.setItem('pedidos_live_count', String(count));
      localStorage.setItem('pedidos_live_count_time', String(ahora));
    } else if (lastUpdate === 0) {
      // primera vez
      localStorage.setItem('pedidos_live_count', String(count));
      localStorage.setItem('pedidos_live_count_time', String(ahora));
    }
    el.textContent = count;
    // timer que aumenta cada 67 minutos
    setInterval(function() {
      var c = parseInt(localStorage.getItem('pedidos_live_count') || '1', 10);
      c += Math.random() < 0.5 ? 1 : 2;
      localStorage.setItem('pedidos_live_count', String(c));
      localStorage.setItem('pedidos_live_count_time', String(Date.now()));
      var e = document.getElementById('live-count');
      if (e) e.textContent = c;
    }, intervalo);
  }

  // --- inicializacion principal ---
  window.inicializarPanelPedidos = function() {
    configurarEventos();
    window.calcularCosto();
    window.cargarPedidos();
    window.limpiarIntervaloPedidos();
    iniciarAutoRecarga();
    iniciarLiveCount();
  };

})();
</script>
